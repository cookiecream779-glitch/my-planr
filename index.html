<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planr — Smart Calendar & Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--surface3:#e8e6de;
  --border:#e2e0d8;--border2:#ccc9be;--text:#1a1916;--text2:#6b6860;--text3:#9c9a94;
  --accent:#2563eb;--accent-light:#eff6ff;--danger:#dc2626;--danger-light:#fef2f2;
  --success:#16a34a;--success-light:#f0fdf4;--warning:#d97706;--warning-light:#fffbeb;
  --radius:10px;--radius-lg:14px;--radius-xl:18px;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.14),0 2px 8px rgba(0,0,0,.08);
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --sidebar-w:264px;
}
[data-theme="dark"]{
  --bg:#111110;--surface:#1c1b19;--surface2:#252421;--surface3:#2e2d2a;
  --border:#2e2d2a;--border2:#3d3c38;--text:#f0efe9;--text2:#a8a69e;--text3:#6b6860;
  --accent:#3b82f6;--accent-light:#1e3a5f33;--danger-light:#3b0f0f;--success-light:#0d2b1a;--warning-light:#2d1f08;
}
[data-theme="hc"]{
  --bg:#000;--surface:#0a0a0a;--surface2:#111;--surface3:#1a1a1a;
  --border:#444;--border2:#666;--text:#fff;--text2:#ccc;--text3:#999;--accent:#60a5fa;--accent-light:#00003a;
}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:var(--font);font-size:14px;color:var(--text);background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;outline:none;width:100%;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
textarea{resize:vertical;min-height:70px}
select option{background:var(--surface);color:var(--text)}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{height:54px;display:flex;align-items:center;gap:10px;padding:0 16px;background:var(--surface);border-bottom:1px solid var(--border);z-index:200;flex-shrink:0}
.stats-bar{height:42px;display:flex;align-items:center;gap:8px;padding:0 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.filter-bar{height:42px;display:flex;align-items:center;gap:6px;padding:0 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.body-wrap{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .2s}
.sidebar.hidden{width:0;overflow:hidden}
.main-area{flex:1;overflow:hidden;display:flex;flex-direction:column}
.cal-wrap{flex:1;overflow:hidden;padding:10px 12px;display:flex;flex-direction:column;gap:4px}

/* TOPBAR */
.logo{font-size:19px;font-weight:600;letter-spacing:-.5px;white-space:nowrap;color:var(--text)}
.logo b{color:var(--accent);font-weight:600}
.view-tabs{display:flex;gap:2px;background:var(--surface2);border-radius:9px;padding:3px;flex-shrink:0}
.vt{padding:5px 11px;border-radius:7px;font-size:12px;font-weight:500;color:var(--text2);transition:all .15s;white-space:nowrap;font-family:var(--font)}
.vt.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.vt:hover:not(.active){color:var(--text)}
.period-nav{display:flex;align-items:center;gap:5px}
.period-label{font-size:14px;font-weight:600;letter-spacing:-.3px;min-width:190px;text-align:center;white-space:nowrap}
.nav-arr{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--text2);transition:background .12s}
.nav-arr:hover{background:var(--surface2);color:var(--text)}
.today-btn{padding:5px 13px;border-radius:8px;background:var(--accent);color:#fff;font-size:12px;font-weight:600;white-space:nowrap}
.today-btn:hover{opacity:.88}
.tr{margin-left:auto;display:flex;align-items:center;gap:6px}
.ib{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--text2);transition:background .12s}
.ib:hover{background:var(--surface2);color:var(--text)}
.sb-wrap{position:relative}
.sb-wrap input{padding-left:30px;width:190px;height:30px;font-size:12px;border-radius:8px}
.sb-wrap .ti-search{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text3);pointer-events:none}
.add-btn-main{display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:8px;background:var(--accent);color:#fff;font-size:12px;font-weight:600;white-space:nowrap}
.add-btn-main:hover{opacity:.88}

/* STATS */
.sc{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:14px;font-size:11px;font-weight:500;color:var(--text2);background:var(--surface2);border:1px solid var(--border);white-space:nowrap;flex-shrink:0}
.sc strong{color:var(--text)}
.sc.cp{cursor:pointer;transition:background .12s}
.sc.cp:hover{background:var(--surface3)}

/* FILTER BAR */
.fc{padding:4px 11px;border-radius:14px;font-size:11px;font-weight:600;border:1px solid var(--border);color:var(--text2);background:transparent;cursor:pointer;transition:all .12s;white-space:nowrap;font-family:var(--font)}
.fc:hover{background:var(--surface2);color:var(--text)}
.fc.active{background:var(--accent);border-color:var(--accent);color:#fff}
.fr{margin-left:auto;font-size:11px;color:var(--text3)}

/* SIDEBAR */
.sb-head{padding:12px 12px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--border)}
.sb-head-title{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--text3)}
.sb-add-btn{display:flex;align-items:center;gap:3px;padding:4px 9px;border-radius:6px;background:var(--surface2);color:var(--text2);font-size:11px;font-weight:600;border:1px solid var(--border);font-family:var(--font)}
.sb-add-btn:hover{background:var(--surface3)}
.sb-list{flex:1;overflow-y:auto;padding:8px 8px 4px}
.stc{background:var(--surface2);border:1px solid var(--border);border-left:3px solid;border-radius:var(--radius);padding:8px 10px;margin-bottom:6px;cursor:grab;user-select:none;transition:box-shadow .15s,transform .15s}
.stc:active{cursor:grabbing}
.stc:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.stc.drag-ghost{opacity:.4}
.stc-title{font-size:12px;font-weight:500;display:flex;align-items:center;gap:5px;margin-bottom:3px}
.stc-meta{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:5px}
.pdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.cpill{font-size:9px;padding:1px 6px;border-radius:3px;font-weight:700}
.sb-empty{text-align:center;padding:24px 14px;color:var(--text3);font-size:11px;line-height:1.8}
.sb-empty .ti{font-size:26px;display:block;margin-bottom:5px;opacity:.3}
.drop-zone{min-height:52px;margin:6px 8px 8px;border:2px dashed var(--border);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);gap:5px;transition:all .15s;flex-shrink:0}
.drop-zone.dz-active{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}

/* MINI CAL */
.mini-wrap{padding:10px 12px 12px;border-top:1px solid var(--border);flex-shrink:0}
.mini-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.mini-title{font-size:11px;font-weight:600}
.mnb{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text2)}
.mnb:hover{background:var(--surface2)}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.mdl2{font-size:9px;color:var(--text3);text-align:center;padding:1px 0;font-weight:700;text-transform:uppercase}
.md{font-size:10px;text-align:center;padding:2px 1px;border-radius:4px;cursor:pointer;color:var(--text2);line-height:1.4}
.md:hover{background:var(--surface2)}
.md.mt{background:var(--accent);color:#fff;font-weight:700}
.md.ms:not(.mt){background:var(--accent-light);color:var(--accent);font-weight:600}
.md.om{opacity:.3}

/* MONTH GRID */
.month-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;flex-shrink:0}
.ml{text-align:center;font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:2px 0}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;flex:1;min-height:0}
.dc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:6px 7px;display:flex;flex-direction:column;overflow:hidden;cursor:default;transition:border-color .15s;position:relative;min-height:0}
.dc:hover{border-color:var(--border2)}
.dc.today{border-color:var(--accent);border-width:2px}
.dc.today .dn{background:var(--accent);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.dc.om2{opacity:.38}
.dc.we{background:var(--surface2)}
.dc.dov{background:var(--accent-light);border-color:var(--accent);border-width:2px}
.dnr{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;flex-shrink:0}
.dn{font-size:11px;font-weight:600;line-height:1}
.dacts{display:flex;gap:2px;opacity:0;transition:opacity .15s}
.dc:hover .dacts{opacity:1}
.dab{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text3)}
.dab:hover{background:var(--surface2);color:var(--text)}
.dtl{display:flex;flex-direction:column;gap:2px;flex:1;overflow:hidden}
.chip{display:flex;align-items:center;gap:3px;font-size:10px;padding:2px 5px;border-radius:4px;cursor:pointer;font-weight:500;overflow:hidden;white-space:nowrap;flex-shrink:0;transition:opacity .12s;user-select:none}
.chip:hover{opacity:.8}
.chip.done{text-decoration:line-through;opacity:.4}
.chip-txt{overflow:hidden;text-overflow:ellipsis;flex:1}
.chip-time{font-size:8px;opacity:.65;font-family:var(--mono);flex-shrink:0}
.more{font-size:9px;color:var(--text3);cursor:pointer;padding:1px 3px;border-radius:3px}
.more:hover{background:var(--surface2)}
.hdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* WEEK VIEW */
.week-outer{flex:1;display:flex;flex-direction:column;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;min-height:0}
.wk-head{display:grid;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.wk-corner{border-right:1px solid var(--border);padding:8px 0}
.wk-dh{padding:8px 6px;text-align:center;border-left:1px solid var(--border)}
.wk-dn{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3)}
.wk-num{font-size:20px;font-weight:300;line-height:1.1}
.wk-num.tn{color:var(--accent);font-weight:600}
.wk-body{flex:1;overflow-y:auto;display:grid}
.wk-tcol{border-right:1px solid var(--border)}
.wk-hl{height:50px;padding:2px 5px;font-size:9px;font-family:var(--mono);color:var(--text3);border-bottom:1px solid var(--border);display:flex;align-items:flex-start}
.wk-dcol{border-left:1px solid var(--border)}
.wk-dcol.tdc{background:var(--accent-light)}
.wk-hcell{height:50px;border-bottom:1px solid var(--border);padding:2px;display:flex;flex-direction:column;gap:1px}
.wchip{font-size:10px;padding:2px 4px;border-radius:3px;cursor:pointer;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.wchip:hover{opacity:.8}

/* DAY VIEW */
.dv-outer{flex:1;overflow:hidden;display:flex;flex-direction:column}
.dv-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.dv-title{font-size:15px;font-weight:600;letter-spacing:-.3px}
.dv-sub{font-size:11px;color:var(--text3);margin-top:1px}
.dv-allday{padding:8px 14px;border-bottom:1px solid var(--border)}
.dv-scroll{flex:1;overflow-y:auto}
.dv-row{display:flex;min-height:56px;border-top:1px solid var(--border)}
.dv-time{width:60px;flex-shrink:0;padding:7px 8px;font-size:10px;font-family:var(--mono);color:var(--text3)}
.dv-slot{flex:1;padding:3px 6px;display:flex;flex-direction:column;gap:3px;cursor:pointer;transition:background .1s}
.dv-slot:hover{background:var(--surface2)}
.dv-task{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500}
.dv-task:hover{opacity:.85}
.dv-task.done{text-decoration:line-through;opacity:.4}

/* AGENDA */
.ag-outer{flex:1;overflow-y:auto;padding:2px 6px 12px}
.ag-day{margin-bottom:18px}
.ag-dh{display:flex;align-items:center;gap:8px;padding:8px 6px 6px;border-bottom:1px solid var(--border);margin-bottom:7px}
.ag-dl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.ag-tb{font-size:9px;padding:2px 7px;border-radius:3px;background:var(--accent);color:#fff;font-weight:700;text-transform:none;letter-spacing:0}
.ag-row{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer;margin-bottom:3px;border-left:3px solid transparent;transition:background .12s}
.ag-row:hover{background:var(--surface2)}
.ag-row.done{opacity:.4}
.ag-info{flex:1;min-width:0}
.ag-t{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ag-s{font-size:10px;color:var(--text3);font-family:var(--mono)}
.ag-empty{text-align:center;padding:40px;color:var(--text3)}

/* DASHBOARD */
.dash-outer{flex:1;overflow-y:auto;padding:14px}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:12px}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px}
.dct{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:8px}
.dcv{font-size:30px;font-weight:300;letter-spacing:-1px;line-height:1}
.dcl{font-size:11px;color:var(--text3);margin-top:2px}
.dash-tl{display:flex;flex-direction:column;gap:5px}
.dtr{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:7px;background:var(--surface2);cursor:pointer;transition:background .12s;border-left:3px solid transparent}
.dtr:hover{background:var(--surface3)}
.dtr.done{opacity:.4;text-decoration:line-through}
.dtr-txt{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}
.dtr-d{font-size:10px;color:var(--text3)}
.chart-wrap{height:170px;position:relative}
.dc-wide{grid-column:1/-1}
.hm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:6px}
.hm-cell{height:18px;border-radius:3px;cursor:pointer;transition:opacity .12s}
.hm-cell:hover{opacity:.75}
.hm-legend{display:flex;gap:10px;margin-top:8px;font-size:10px;color:var(--text3)}
.hml{display:flex;align-items:center;gap:4px}
.hml-dot{width:10px;height:10px;border-radius:2px}

/* EXPANDED DAY OVERLAY */
.exp-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:300;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}
.exp-ov.open{display:flex}
.exp-panel{background:var(--surface);border-radius:var(--radius-xl);width:100%;max-width:580px;max-height:86vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow-lg)}
.exp-head{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
.exp-title{font-size:16px;font-weight:600;letter-spacing:-.3px}
.exp-sub{font-size:11px;color:var(--text3);margin-top:2px}
.exp-body{flex:1;overflow-y:auto;padding:14px 18px}
.exp-allday{margin-bottom:12px}
.sec-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:6px}
.tl-row{display:flex;min-height:42px;border-top:1px dashed var(--border)}
.tl-row:first-child{border-top:none}
.tl-time{width:38px;flex-shrink:0;font-size:9px;font-family:var(--mono);color:var(--text3);padding-top:5px}
.tl-tasks{flex:1;padding:3px 0;display:flex;flex-direction:column;gap:3px}
.tl-task{display:flex;align-items:center;gap:7px;padding:5px 9px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500}
.tl-task:hover{opacity:.85}
.tl-task.done{text-decoration:line-through;opacity:.4}
.tl-dur{font-size:10px;opacity:.55;margin-left:auto;font-family:var(--mono)}
.tl-add{display:flex;align-items:center;gap:6px;padding:4px 9px;border-radius:6px;font-size:11px;color:var(--text3);cursor:pointer;border:1px dashed transparent;transition:all .12s}
.tl-add:hover{background:var(--surface2);border-color:var(--border);color:var(--text2)}
.exp-empty{text-align:center;padding:30px;color:var(--text3);font-size:12px}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.44);z-index:500;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.mo.open{display:flex}
.mo-box{background:var(--surface);border-radius:var(--radius-xl);width:100%;max-width:540px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.mo-head{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:5}
.mo-title{font-size:15px;font-weight:600;letter-spacing:-.3px}
.mo-body{padding:18px 22px}
.mo-foot{padding:12px 22px;border-top:1px solid var(--border);display:flex;align-items:center;gap:7px}
.mo-right{margin-left:auto;display:flex;gap:7px}
.fg{margin-bottom:14px}
.fl{display:block;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--text2);margin-bottom:5px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid transparent;font-family:var(--font);transition:all .15s}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-p:hover{opacity:.88}
.btn-s{background:var(--surface2);color:var(--text);border-color:var(--border)}
.btn-s:hover{background:var(--surface3)}
.btn-d{background:transparent;color:var(--danger);border-color:var(--danger)}
.btn-d:hover{background:var(--danger-light)}
.btn-g{background:transparent;color:var(--text2);border-color:var(--border)}
.btn-g:hover{background:var(--surface2)}
.pri-row{display:flex;gap:7px}
.pb{flex:1;padding:7px 4px;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;text-align:center;font-size:11px;font-weight:700;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:4px;transition:all .15s}
.pb.ph{color:var(--danger)}
.pb.pm{color:var(--warning)}
.pb.pl{color:var(--success)}
.pb.ph.sel{background:var(--danger-light);border-color:var(--danger)}
.pb.pm.sel{background:var(--warning-light);border-color:var(--warning)}
.pb.pl.sel{background:var(--success-light);border-color:var(--success)}
.cgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;margin-top:5px}
.cs{width:24px;height:24px;border-radius:6px;cursor:pointer;transition:transform .12s,box-shadow .12s;border:2px solid transparent}
.cs:hover{transform:scale(1.12)}
.cs.sel{box-shadow:0 0 0 2px var(--surface),0 0 0 4px var(--text)}
.cc-row{display:flex;align-items:center;gap:7px;margin-top:7px}
.cc-row input[type=color]{width:30px;height:30px;border-radius:6px;padding:2px;cursor:pointer;border:1.5px solid var(--border);background:var(--surface2);flex-shrink:0}
.fav-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.fav-dot{width:18px;height:18px;border-radius:4px;cursor:pointer;border:1.5px solid transparent}
.fav-dot:hover{transform:scale(1.12)}

/* TASK POPUP */
.tpop{position:fixed;z-index:400;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:295px;padding:14px;animation:pi .14s ease}
@keyframes pi{from{opacity:0;transform:scale(.95) translateY(3px)}to{opacity:1;transform:none}}
.tpop-title{font-size:14px;font-weight:600;margin-bottom:7px;line-height:1.3}
.tpop-row{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text2);margin-bottom:4px}
.tpop-row .ti{font-size:13px;flex-shrink:0}
.tpop-desc{font-size:11px;color:var(--text3);margin-bottom:7px;line-height:1.5}
.tpop-acts{display:flex;gap:4px;padding-top:10px;border-top:1px solid var(--border);margin-top:8px}
.tpa{flex:1;padding:5px 3px;border-radius:6px;font-size:10px;font-weight:700;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;color:var(--text2);background:var(--surface2);font-family:var(--font);transition:background .1s}
.tpa:hover{background:var(--surface3)}
.tpa.tdg{color:var(--danger)}
.tpa.tdg:hover{background:var(--danger-light)}

/* SETTINGS */
.set-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:450;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}
.set-ov.open{display:flex}
.set-panel{background:var(--surface);border-radius:var(--radius-xl);width:100%;max-width:400px;overflow:hidden;box-shadow:var(--shadow-lg)}
.set-head{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.set-body{padding:16px 20px;display:flex;flex-direction:column;gap:14px}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.set-lbl{font-size:12px;font-weight:500}
.set-sub{font-size:10px;color:var(--text3);margin-top:1px}
.tog{position:relative;width:38px;height:20px;flex-shrink:0}
.tog input{display:none}
.tog-track{display:block;width:38px;height:20px;border-radius:10px;background:var(--surface3);border:1px solid var(--border);cursor:pointer;transition:background .2s}
.tog input:checked+.tog-track{background:var(--accent);border-color:var(--accent)}
.tog-thumb{position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .2s;pointer-events:none;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog input:checked~.tog-thumb{transform:translateX(18px)}
.sz-btns{display:flex;gap:3px}
.szb{padding:3px 9px;border-radius:5px;border:1px solid var(--border);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);background:transparent;color:var(--text2);transition:all .12s}
.szb.active,.szb:hover{background:var(--accent);border-color:var(--accent);color:#fff}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:var(--surface);padding:9px 16px;border-radius:9px;font-size:12px;font-weight:500;z-index:600;transform:translateY(10px);opacity:0;transition:all .22s;pointer-events:none;box-shadow:var(--shadow-lg);max-width:300px}
.toast.show{transform:translateY(0);opacity:1}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>

<script>
// ── CONSTANTS ────────────────────────────────────────────────────────────────
const COLORS=['#ef4444','#f97316','#f59e0b','#eab308','#84cc16','#22c55e','#10b981','#14b8a6','#06b6d4','#0ea5e9','#3b82f6','#6366f1','#8b5cf6','#a855f7','#ec4899','#f43f5e','#64748b','#0891b2','#059669','#d97706'];
const CAT_C={School:'#3b82f6',Work:'#8b5cf6',Personal:'#10b981',Health:'#ef4444',Finance:'#f59e0b',Social:'#ec4899',Study:'#06b6d4',Fitness:'#f97316'};
const PRI_C={high:'#ef4444',medium:'#f59e0b',low:'#22c55e'};
const PRI_ORD={high:0,medium:1,low:2};
const TODAY_DATE=new Date(2025,5,3);

// ── STATE ────────────────────────────────────────────────────────────────────
let tasks=[];
let nid=1;
let favColors=[];
let editingId=null;
let curView='month';
let curDate=new Date(2025,5,3);
let miniDate=new Date(2025,5,1);
let sbOpen=true;
let activeFilter='all';
let searchQ='';
let dragId=null;
let aPri='medium';
let aColor=COLORS[10];
let popEl=null;
let chartInst={};

// ── LOAD / SAVE ───────────────────────────────────────────────────────────────
function loadData(){
  try{
    const saved=localStorage.getItem('planr_tasks');
    if(saved){tasks=JSON.parse(saved);}
    else{seedTasks();}
    // find max id
    nid=tasks.reduce((m,t)=>Math.max(m,t.id),0)+1;
    const fc=localStorage.getItem('planr_fav');
    if(fc)favColors=JSON.parse(fc);
  }catch(e){seedTasks();}
}
function saveData(){
  try{localStorage.setItem('planr_tasks',JSON.stringify(tasks));}catch(e){}
}
function saveFavData(){
  try{localStorage.setItem('planr_fav',JSON.stringify(favColors));}catch(e){}
}
function seedTasks(){
  tasks=[
    mk(1,'Maths mock revision','Past papers ch.5-8','#3b82f6','high','Study','2025-06-02','2025-06-02','09:00','11:00',false,'Focus on integration','none',false,'120'),
    mk(2,'Economics essay draft','Ch.4 supply & demand','#8b5cf6','medium','School','2025-06-03','2025-06-05','14:00','16:00',false,'Use Keynes model','none',false,'120'),
    mk(3,'Gym session','Chest and shoulders','#f97316','low','Fitness','2025-06-04','2025-06-04','07:00','08:30',false,'','weekly',false,'90'),
    mk(4,'Personal statement draft','Opening hook','#ec4899','high','School','2025-06-10','2025-06-15','10:00','12:00',false,'Oxford E&M focus','none',false,'120'),
    mk(5,'Computing coursework','Finish section B of NEA','#06b6d4','high','School',null,null,'','',false,'Talk to Mr McCrink','none',true,'180'),
    mk(6,'Call parents','Weekend catch-up','#10b981','low','Personal',null,null,'','',false,'','none',true,'30'),
    mk(7,'Weekly planning','Set goals for the week','#f59e0b','medium','Work','2025-06-09','2025-06-09','08:00','08:30',false,'','weekly',false,'30'),
    mk(8,'Further maths problems','Sequences & series sh.3','#6366f1','high','Study','2025-06-06','2025-06-06','15:00','17:00',false,'Proof by induction','none',false,'120'),
    mk(9,'Read economics textbook','Chapter 6 market failure','#84cc16','low','Study','2025-06-11','2025-06-11','19:00','20:00',false,'','none',false,'60'),
    mk(10,'Sleep & hydration log','Daily health tracking','#14b8a6','medium','Health','2025-06-03','2025-06-30','22:00','22:15',false,'','daily',false,'15'),
    mk(11,'MAT practice paper','Oxford admissions prep','#0ea5e9','high','Study','2025-06-25','2025-06-25','09:00','12:00',false,'Section A focus','none',false,'180'),
    mk(12,'Piano practice','Self-composed piece','#ec4899','low','Personal','2025-06-07','2025-06-07','17:00','18:00',false,'TikTok take?','none',false,'60'),
    mk(13,'Bank account review','Check finances for uni','#f59e0b','medium','Finance',null,null,'','',false,'','none',true,'30'),
  ];
  nid=14;
  saveData();
}
function mk(id,title,desc,color,priority,category,startDate,dueDate,startTime,endTime,done,notes,recur,unscheduled,duration){
  return{id,title,desc:desc||'',color,priority,category,startDate:startDate||null,dueDate:dueDate||null,startTime:startTime||'',endTime:endTime||'',done:!!done,notes:notes||'',recur:recur||'none',unscheduled:!!unscheduled,duration:duration||'',reminder:'none',archived:false};
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function ds(d){if(!d)return null;return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function pd(s){if(!s)return null;const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function p2(n){return String(n).padStart(2,'0');}
function ft(t){if(!t)return'';const[h,m]=t.split(':').map(Number);return`${h%12||12}:${p2(m)}${h>=12?'pm':'am'}`;}
function fd(s){if(!s)return'';return pd(s).toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function rgba(hex,a){try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}catch{return hex;}}
function dur2s(d){if(!d)return'';const n=parseInt(d);if(n<60)return n+'m';if(n%60===0)return(n/60)+'h';return Math.floor(n/60)+'h '+n%60+'m';}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── FILTER ────────────────────────────────────────────────────────────────────
function getFiltered(){
  return tasks.filter(t=>{
    if(t.archived)return false;
    if(t.unscheduled)return false; // scheduled tasks only
    if(searchQ){
      const q=searchQ.toLowerCase();
      if(!t.title.toLowerCase().includes(q)&&!(t.desc||'').toLowerCase().includes(q)&&!t.category.toLowerCase().includes(q))return false;
    }
    if(activeFilter==='done')return t.done;
    if(activeFilter==='undone')return!t.done;
    if(activeFilter==='high')return t.priority==='high'&&!t.done;
    if(activeFilter==='overdue')return t.dueDate&&!t.done&&pd(t.dueDate)<TODAY_DATE;
    if(activeFilter==='upcoming')return t.dueDate&&!t.done&&pd(t.dueDate)>=TODAY_DATE;
    return true;
  });
}

// Core function: which tasks appear on a given date string
function tasksOnDate(dStr){
  const all=getFiltered();
  return all.filter(t=>{
    if(!t.startDate&&!t.dueDate)return false;
    // recurring
    if(t.recur==='daily'&&t.startDate&&dStr>=t.startDate)return true;
    if(t.recur==='weekly'&&t.startDate){
      const sd=pd(t.startDate),dd=pd(dStr);
      return sd.getDay()===dd.getDay()&&dd>=sd;
    }
    if(t.recur==='monthly'&&t.startDate){
      const sd=pd(t.startDate),dd=pd(dStr);
      return sd.getDate()===dd.getDate()&&dd>=sd;
    }
    // date range
    if(t.startDate&&t.dueDate)return dStr>=t.startDate&&dStr<=t.dueDate;
    // single date
    return t.startDate===dStr||t.dueDate===dStr;
  });
}

// ── RENDER MASTER ─────────────────────────────────────────────────────────────
function render(){
  renderStats();
  renderFilterBar();
  renderSB();
  renderMiniCal();
  renderPeriodLabel();
  const cw=document.getElementById('cal-wrap');
  cw.innerHTML='';
  // destroy old charts
  Object.values(chartInst).forEach(c=>{try{c.destroy();}catch{}});
  chartInst={};
  if(curView==='month')renderMonth(cw);
  else if(curView==='week')renderWeek(cw);
  else if(curView==='day')renderDayView(cw);
  else if(curView==='agenda')renderAgenda(cw);
  else renderDashboard(cw);
}

// ── STATS BAR ─────────────────────────────────────────────────────────────────
function renderStats(){
  const all=tasks.filter(t=>!t.archived);
  const done=all.filter(t=>t.done).length;
  const total=all.filter(t=>!t.unscheduled).length;
  const todayT=tasksOnDate(ds(TODAY_DATE)).length;
  const high=all.filter(t=>t.priority==='high'&&!t.done&&!t.unscheduled).length;
  const overdue=all.filter(t=>t.dueDate&&!t.done&&!t.unscheduled&&pd(t.dueDate)<TODAY_DATE).length;
  const unsched=all.filter(t=>t.unscheduled).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('stats-bar').innerHTML=`
    <div class="sc"><i class="ti ti-check" style="color:var(--success)"></i><strong>${done}</strong> done</div>
    <div class="sc"><i class="ti ti-calendar-event"></i><strong>${todayT}</strong> today</div>
    <div class="sc"><i class="ti ti-alert-triangle" style="color:var(--danger)"></i><strong>${high}</strong> high priority</div>
    <div class="sc cp" onclick="setFilter('overdue')"><i class="ti ti-clock" style="color:var(--warning)"></i><strong>${overdue}</strong> overdue</div>
    <div class="sc"><i class="ti ti-inbox"></i><strong>${unsched}</strong> unscheduled</div>

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function renderSB(){
  let list=tasks.filter(t=>t.unscheduled&&!t.archived);
  if(searchQ){const q=searchQ.toLowerCase();list=list.filter(t=>t.title.toLowerCase().includes(q)||t.category.toLowerCase().includes(q));}
  const sort=document.getElementById('sort-sel')?.value||'added';
  if(sort==='priority')list.sort((a,b)=>PRI_ORD[a.priority]-PRI_ORD[b.priority]);
  else if(sort==='category')list.sort((a,b)=>a.category.localeCompare(b.category));
  const el=document.getElementById('sb-list');
  if(!list.length){
    el.innerHTML=`<div class="sb-empty"><i class="ti ti-inbox-off"></i>No unscheduled tasks.<br>Add one or drag a task here.</div>`;

  el.innerHTML=list.map(t=>`

      ondragstart="onDS(event,${t.id})" onclick="showPop(event,${t.id})">

      <div class="stc-meta">
        <span class="cpill" style="background:${rgba(CAT_C[t.category]||'#888',.15)};color:${CAT_C[t.category]||'#888'}">${t.category}</span>
        <span>${t.priority}</span>
        ${t.duration?`<span>${dur2s(t.duration)}</span>`:''}
      </div>
    </div>`).join('');
}

// ── MINI CAL ──────────────────────────────────────────────────────────────────
function renderMiniCal(){
  const y=miniDate.getFullYear(),m=miniDate.getMonth();
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const sd=(first.getDay()+6)%7;
  const prevLast=new Date(y,m,0).getDate();
  let cells='';
  for(let i=sd-1;i>=0;i--)cells+=`<div class="md om">${prevLast-i}</div>`;
  for(let d=1;d<=last.getDate();d++){
    const dStr=`${y}-${p2(m+1)}-${p2(d)}`;
    const isT=dStr===ds(TODAY_DATE),isSel=dStr===ds(curDate);
    cells+=`<div class="md${isT?' mt':isSel&&!isT?' ms':''}" onclick="jumpTo('${dStr}')">${d}</div>`;
  }
  const rem=(7-((sd+last.getDate())%7))%7;
  for(let d=1;d<=rem;d++)cells+=`<div class="md om">${d}</div>`;
  document.getElementById('mini-cal').innerHTML=`
    <div class="mini-head">
      <span class="mini-title">${first.toLocaleDateString('en-GB',{month:'short',year:'numeric'})}</span>
      <div style="display:flex;gap:2px">
        <button class="mnb" onclick="miniNav(-1)"><i class="ti ti-chevron-left" style="font-size:12px"></i></button>
        <button class="mnb" onclick="miniNav(1)"><i class="ti ti-chevron-right" style="font-size:12px"></i></button>
      </div>
    </div>
    <div class="mini-grid">
      ${'MTWTFSS'.split('').map(d=>`<div class="mdl2">${d}</div>`).join('')}
      ${cells}
    </div>`;
}
function miniNav(dir){miniDate=new Date(miniDate.getFullYear(),miniDate.getMonth()+dir,1);renderMiniCal();}

// ── PERIOD LABEL ──────────────────────────────────────────────────────────────
function renderPeriodLabel(){
  let lbl='';
  if(curView==='month')lbl=curDate.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  else if(curView==='week'){
    const s=wkStart(curDate),e=new Date(s);e.setDate(e.getDate()+6);
    lbl=`${s.toLocaleDateString('en-GB',{day:'numeric',month:'short'})} – ${e.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`;
  }
  else if(curView==='day')lbl=curDate.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  else if(curView==='agenda')lbl=curDate.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  else lbl='Dashboard';
  document.getElementById('period-label').textContent=lbl;

// ── MONTH VIEW ────────────────────────────────────────────────────────────────
function renderMonth(cw){
  const showWE=document.getElementById('tog-we')?.checked!==false;
  const cols=showWE?7:5;
  const labelsAll=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const labels=showWE?labelsAll:labelsAll.slice(0,5);
  const y=curDate.getFullYear(),m=curDate.getMonth();
  const first=new Date(y,m,1);
  const daysInMonth=new Date(y,m+1,0).getDate();
  let startDay=(first.getDay()+6)%7; // 0=Mon
  if(!showWE)startDay=Math.min(startDay,4);

  const lRow=document.createElement('div');
  lRow.className='month-labels';
  lRow.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  lRow.innerHTML=labels.map(l=>`<div class="ml">${l}</div>`).join('');

  const grid=document.createElement('div');
  grid.className='month-grid';
  grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;

  // prev month padding
  const prevLast=new Date(y,m,0).getDate();
  for(let i=startDay-1;i>=0;i--){
    const d=prevLast-i;
    const dStr=ds(new Date(y,m-1,d));
    grid.appendChild(makeDC(dStr,d,true));
  }
  // current month
  for(let d=1;d<=daysInMonth;d++){
    const dayObj=new Date(y,m,d);
    const dow=dayObj.getDay(); // 0=Sun 6=Sat
    if(!showWE&&(dow===0||dow===6))continue;
    const dStr=`${y}-${p2(m+1)}-${p2(d)}`;
    grid.appendChild(makeDC(dStr,d,false));
  }
  // next month padding
  const totalSoFar=grid.children.length;
  const rem=totalSoFar%cols===0?0:cols-(totalSoFar%cols);
  for(let d=1;d<=rem;d++){
    const dStr=ds(new Date(y,m+1,d));
    grid.appendChild(makeDC(dStr,d,true));
  }

  cw.appendChild(lRow);
  cw.appendChild(grid);

  // drag events
  grid.querySelectorAll('.dc').forEach(el=>{
    el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('dov');});
    el.addEventListener('dragleave',()=>el.classList.remove('dov'));
    el.addEventListener('drop',e=>onDrop(e,el.dataset.date));
  });
}

function makeDC(dStr,dayNum,otherMonth){
  const el=document.createElement('div');
  const isToday=dStr===ds(TODAY_DATE);
  const dow=pd(dStr).getDay();
  const isWE=dow===0||dow===6;
  el.className=`dc${otherMonth?' om2':''}${isToday?' today':''}${isWE?' we':''}`;
  el.dataset.date=dStr;

  const dayTasks=tasksOnDate(dStr);
  const showHeat=document.getElementById('tog-heat')?.checked!==false;
  const n=dayTasks.length;
  const hColor=n>=5?'#ef4444':n>=3?'#f59e0b':n>=1?'#22c55e':'transparent';
  const MAX=3;

  const chips=dayTasks.slice(0,MAX).map(t=>`
    <div class="chip${t.done?' done':''}" style="background:${rgba(t.color,.16)};color:${t.color}"
      draggable="true" ondragstart="onDS(event,${t.id})" onclick="event.stopPropagation();showPop(event,${t.id})">
      ${t.priority==='high'?`<i class="ti ti-alert-triangle" style="font-size:8px;flex-shrink:0"></i>`:''}
      <span class="chip-txt">${esc(t.title)}</span>
      ${t.startTime?`<span class="chip-time">${ft(t.startTime)}</span>`:''}
    </div>`).join('');
  const more=n>MAX?`<div class="more" onclick="event.stopPropagation();openExp('${dStr}')">+${n-MAX} more</div>`:'';

  el.innerHTML=`
    <div class="dnr">
      <span class="dn">${isToday?`<span style="font-size:11px;font-weight:700">${dayNum}</span>`:dayNum}</span>
      <div style="display:flex;align-items:center;gap:2px">
        ${showHeat&&n>0?`<div class="hdot" style="background:${hColor}" title="${n} task${n>1?'s':''}"></div>`:''}
        <div class="dacts">
          <button class="dab" onclick="event.stopPropagation();openExp('${dStr}')" title="Expand day"><i class="ti ti-layout-list"></i></button>
          <button class="dab" onclick="event.stopPropagation();openModal(null,'${dStr}')" title="Add task"><i class="ti ti-plus"></i></button>
        </div>
      </div>
    </div>
    <div class="dtl">${chips}${more}</div>`;

  el.addEventListener('click',e=>{
    if(e.target.closest('.chip,.more,.dab'))return;
    openModal(null,dStr);
  });
  return el;
}

// ── WEEK VIEW ──────────────────────────────────────────────────────────────────
function wkStart(d){const day=d.getDay();const diff=day===0?-6:1-day;const s=new Date(d);s.setDate(d.getDate()+diff);return s;}
function renderWeek(cw){
  const start=wkStart(curDate);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(start);d.setDate(start.getDate()+i);return d;});
  const dn=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const hours=Array.from({length:24},(_,i)=>i);
  const cols=`52px ${days.map(()=>'1fr').join(' ')}`;

  const outer=document.createElement('div');
  outer.className='week-outer';

  const head=document.createElement('div');
  head.className='wk-head';
  head.style.gridTemplateColumns=cols;
  head.innerHTML=`<div class="wk-corner"></div>`+days.map((d,i)=>{
    const dStr=ds(d);const isT=dStr===ds(TODAY_DATE);
    return`<div class="wk-dh">
      <div class="wk-dn">${dn[i]}</div>
      <div class="wk-num${isT?' tn':''}">${d.getDate()}</div>
    </div>`;
  }).join('');

  const body=document.createElement('div');
  body.className='wk-body';
  body.style.gridTemplateColumns=cols;

  // time col
  const tCol=document.createElement('div');
  tCol.className='wk-tcol';
  tCol.innerHTML=hours.map(h=>`<div class="wk-hl">${h===0?'12am':h<12?h+'am':h===12?'12pm':(h-12)+'pm'}</div>`).join('');
  body.appendChild(tCol);

  days.forEach(d=>{
    const dStr=ds(d);const isT=dStr===ds(TODAY_DATE);
    const col=document.createElement('div');
    col.className=`wk-dcol${isT?' tdc':''}`;
    col.innerHTML=hours.map(h=>{
      const slotT=tasksOnDate(dStr).filter(t=>t.startTime&&t.startTime.startsWith(p2(h)));
      return`<div class="wk-hcell">${slotT.map(t=>`<div class="wchip" style="background:${rgba(t.color,.18)};color:${t.color}" onclick="showPop(event,${t.id})">${esc(t.title)}</div>`).join('')}</div>`;
    }).join('');
    body.appendChild(col);
  });

  outer.appendChild(head);
  outer.appendChild(body);
  cw.appendChild(outer);
}

// ── DAY VIEW ──────────────────────────────────────────────────────────────────
function renderDayView(cw){
  const dStr=ds(curDate);
  const label=curDate.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const dayT=tasksOnDate(dStr);
  const timed=dayT.filter(t=>t.startTime).sort((a,b)=>a.startTime.localeCompare(b.startTime));
  const allDay=dayT.filter(t=>!t.startTime);
  const hours=Array.from({length:24},(_,i)=>i);

  const outer=document.createElement('div');
  outer.className='dv-outer';
  const adHtml=allDay.length?`<div class="dv-allday">
    <div class="sec-lbl" style="margin-bottom:6px">All-day</div>
    ${allDay.map(t=>`<div class="dv-task${t.done?' done':''}" style="background:${rgba(t.color,.15)};color:${t.color};margin-bottom:4px" onclick="showPop(event,${t.id})">
      <i class="ti ti-circle-dot" style="font-size:11px"></i>${esc(t.title)}
    </div>`).join('')}
  </div>`:'';

  const tl=hours.map(h=>{
    const slotT=timed.filter(t=>t.startTime.startsWith(p2(h)));
    const tL=h===0?'12 am':h<12?h+' am':h===12?'12 pm':(h-12)+' pm';
    return`<div class="dv-row">
      <div class="dv-time">${tL}</div>
      <div class="dv-slot" onclick="openModalWithTime('${dStr}','${p2(h)}:00')">
        ${slotT.map(t=>`<div class="dv-task${t.done?' done':''}" style="background:${rgba(t.color,.18)};color:${t.color}" onclick="event.stopPropagation();showPop(event,${t.id})">
          <i class="ti ti-circle-dot" style="font-size:11px"></i>
          <span style="flex:1">${esc(t.title)}</span>
          <span style="font-size:10px;opacity:.6;font-family:var(--mono)">${ft(t.startTime)}${t.endTime?' – '+ft(t.endTime):''}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');

  outer.innerHTML=`
    <div class="dv-head">
      <div><div class="dv-title">${label}</div><div class="dv-sub">${dayT.length} task${dayT.length!==1?'s':''}</div></div>
      <button class="btn btn-p" style="font-size:11px;padding:5px 11px" onclick="openModal(null,'${dStr}')"><i class="ti ti-plus"></i> Add</button>
    </div>
    ${adHtml}
    <div class="dv-scroll"><div>${tl}</div></div>`;
  cw.appendChild(outer);
}

// ── AGENDA VIEW ───────────────────────────────────────────────────────────────
function renderAgenda(cw){
  const filtered=getFiltered().filter(t=>t.startDate||t.dueDate);
  const grouped={};
  filtered.forEach(t=>{
    const key=t.startDate||t.dueDate;
    if(!grouped[key])grouped[key]=[];
    if(!grouped[key].find(x=>x.id===t.id))grouped[key].push(t);
  });
  const sortedDates=Object.keys(grouped).sort();
  const outer=document.createElement('div');
  outer.style.flex='1';outer.style.overflow='hidden';outer.style.display='flex';outer.style.flexDirection='column';
  if(!sortedDates.length){
    outer.innerHTML=`<div class="ag-empty"><i class="ti ti-calendar-off" style="font-size:40px;display:block;margin-bottom:10px;opacity:.25"></i>No tasks for current filter</div>`;
    cw.appendChild(outer);return;
  }
  const html=sortedDates.map(dStr=>{
    const d=pd(dStr),isT=dStr===ds(TODAY_DATE);
    const lbl=d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    const rows=grouped[dStr].sort((a,b)=>(a.startTime||'').localeCompare(b.startTime||'')).map(t=>`
      <div class="ag-row${t.done?' done':''}" style="border-left-color:${t.color}" onclick="showPop(event,${t.id})">
        <span class="pdot" style="background:${PRI_C[t.priority]}"></span>
        <div class="ag-info">
          <div class="ag-t">${esc(t.title)}</div>
          ${t.startTime?`<div class="ag-s">${ft(t.startTime)}${t.endTime?' – '+ft(t.endTime):''}</div>`:''}
        </div>
        <span class="cpill" style="background:${rgba(CAT_C[t.category]||'#888',.15)};color:${CAT_C[t.category]||'#888'}">${t.category}</span>
        ${t.recur!=='none'?`<i class="ti ti-repeat" style="font-size:12px;color:var(--text3)" title="Repeats ${t.recur}"></i>`:''}
      </div>`).join('');
    return`<div class="ag-day">
      <div class="ag-dh">
        <div class="ag-dl">${lbl}</div>
        ${isT?'<span class="ag-tb">Today</span>':''}
      </div>${rows}
    </div>`;
  }).join('');
  outer.innerHTML=`<div class="ag-outer">${html}</div>`;
  cw.appendChild(outer);
}

    if(hg){
      for(let i=-10;i<=10;i++){
        const d=new Date(TODAY_DATE);d.setDate(d.getDate()+i);
        const dStr=ds(d);const n=tasksOnDate(dStr).length;
        const bg=n>=5?'#ef4444':n>=3?'#f59e0b':n>=1?'#22c55e':'var(--surface2)';
        const cell=document.createElement('div');
        cell.className='hm-cell';
        cell.style.background=bg;
        cell.title=`${d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}: ${n} task${n!==1?'s':''}`;
        cell.onclick=()=>jumpTo(dStr);
        hg.appendChild(cell);
      }
    }
  },80);
}

// ── EXPANDED DAY ──────────────────────────────────────────────────────────────
function openExp(dStr){
  const d=pd(dStr);
  const lbl=d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('exp-title').textContent=lbl;
  document.getElementById('exp-sub').textContent=dStr===ds(TODAY_DATE)?'Today':'';
  document.getElementById('exp-add-btn').onclick=()=>{openModal(null,dStr);closeExp();};
  buildExpBody(dStr);
  document.getElementById('exp-ov').classList.add('open');
}
function buildExpBody(dStr){
  const dayT=tasksOnDate(dStr);
  const allDay=dayT.filter(t=>!t.startTime);
  const timed=dayT.filter(t=>t.startTime).sort((a,b)=>a.startTime.localeCompare(b.startTime));
  const hours=Array.from({length:24},(_,i)=>i);
  const adHtml=allDay.length?`<div class="exp-allday">
    <div class="sec-lbl">All-day</div>
    ${allDay.map(t=>`<div class="tl-task${t.done?' done':''}" style="background:${rgba(t.color,.16)};color:${t.color};margin-bottom:3px" onclick="showPop(event,${t.id})">
      <i class="ti ti-circle-dot" style="font-size:10px"></i>${esc(t.title)}
    </div>`).join('')}
  </div>`:'';
  const tl=hours.map(h=>{
    const sT=timed.filter(t=>t.startTime.startsWith(p2(h)));
    const tL=h===0?'12am':h<12?h+'am':h===12?'12pm':(h-12)+'pm';
    const addBtn=`<div class="tl-add" onclick="openModalWithTime('${dStr}','${p2(h)}:00');closeExp()"><i class="ti ti-plus" style="font-size:11px"></i></div>`;
    return`<div class="tl-row">
      <div class="tl-time">${tL}</div>
      <div class="tl-tasks">
        ${sT.map(t=>`<div class="tl-task${t.done?' done':''}" style="background:${rgba(t.color,.18)};color:${t.color}" onclick="showPop(event,${t.id})">
          <i class="ti ti-circle-dot" style="font-size:10px"></i>
          <span style="flex:1">${esc(t.title)}</span>
          <span class="tl-dur">${t.startTime?ft(t.startTime):''} ${t.endTime?'– '+ft(t.endTime):''} ${dur2s(t.duration)}</span>
        </div>`).join('')}
        ${addBtn}
      </div>
    </div>`;
  }).join('');
  const body=document.getElementById('exp-body');
  body.innerHTML=dayT.length?`${adHtml}<div>${tl}</div>`:
    `<div class="exp-empty"><i class="ti ti-calendar-plus" style="font-size:32px;display:block;margin-bottom:8px;opacity:.3"></i>No tasks scheduled.<br>Click + Add to create one.</div>`;
}
function closeExp(){document.getElementById('exp-ov').classList.remove('open');}
function expBgClick(e){if(e.target===document.getElementById('exp-ov'))closeExp();}

// ── DRAG & DROP ───────────────────────────────────────────────────────────────
function onDS(e,id){
  dragId=id;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',String(id));
  setTimeout(()=>{const el=e.target.closest('.stc,.chip');if(el)el.classList.add('drag-ghost');},0);
}
function onDrop(e,dStr){
  e.preventDefault();
  document.querySelectorAll('.dc').forEach(c=>c.classList.remove('dov'));
  if(!dragId)return;
  const t=tasks.find(x=>x.id===dragId);
  if(!t)return;
  if(t.startDate&&t.dueDate&&t.startDate!==t.dueDate){
    const diff=(pd(t.dueDate)-pd(t.startDate))/(86400000);
    const newDue=new Date(pd(dStr));newDue.setDate(newDue.getDate()+diff);
    t.startDate=dStr;t.dueDate=ds(newDue);
  } else{t.startDate=dStr;t.dueDate=dStr;}
  t.unscheduled=false;
  dragId=null;
  saveData();
  toast(`"${t.title}" moved to ${fd(dStr)}`);
  render();
}

// sidebar drop zone
const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dz-active');});
dz.addEventListener('dragleave',()=>dz.classList.remove('dz-active'));
dz.addEventListener('drop',e=>{
  e.preventDefault();
  dz.classList.remove('dz-active');
  if(!dragId)return;
  const t=tasks.find(x=>x.id===dragId);
  if(!t)return;
  t.unscheduled=true;t.startDate=null;t.dueDate=null;
  dragId=null;
  saveData();
  toast(`"${t.title}" moved to Task Bank`);
  render();
});

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(id,date,forceUnscheduled){
  editingId=id||null;
  const t=id?tasks.find(x=>x.id===id):null;
  document.getElementById('mo-title').textContent=id?'Edit Task':'New Task';
  document.getElementById('del-btn').style.display=id?'inline-flex':'none';
  document.getElementById('dup-btn').style.display=id?'inline-flex':'none';
  document.getElementById('f-title').value=t?t.title:'';
  document.getElementById('f-desc').value=t?t.desc:'';
  document.getElementById('f-notes').value=t?t.notes:'';
  document.getElementById('f-sd').value=t?t.startDate||'':(!forceUnscheduled&&date)||'';
  document.getElementById('f-dd').value=t?t.dueDate||'':(!forceUnscheduled&&date)||'';
  document.getElementById('f-ts').value=t?t.startTime||'':'';
  document.getElementById('f-te').value=t?t.endTime||'':'';
  document.getElementById('f-cat').value=t?t.category:'School';
  document.getElementById('f-rec').value=t?t.recur:'none';
  document.getElementById('f-dur').value=t?t.duration||'':'';
  document.getElementById('f-rem').value=t?t.reminder||'none':'none';
  aPri=t?t.priority:'medium';
  aColor=t?t.color:COLORS[10];
  refreshPriButtons();
  refreshColorGrid();
  document.getElementById('cc').value=aColor;
  renderFavRow();
  document.getElementById('mo').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),60);
}
function openModalWithTime(date,time){
  openModal(null,date);
  document.getElementById('f-ts').value=time;
}
function closeModal(){document.getElementById('mo').classList.remove('open');editingId=null;}
function moBgClick(e){if(e.target===document.getElementById('mo'))closeModal();}

function refreshPriButtons(){
  document.querySelectorAll('.pb').forEach(b=>{
    b.classList.remove('sel');
    if((b.classList.contains('ph')&&aPri==='high')||(b.classList.contains('pm')&&aPri==='medium')||(b.classList.contains('pl')&&aPri==='low'))b.classList.add('sel');
  });
}
function selPri(p,btn){aPri=p;document.querySelectorAll('.pb').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');}
function refreshColorGrid(){
  document.getElementById('cgrid').innerHTML=COLORS.map(c=>
    `<div class="cs${c===aColor?' sel':''}" style="background:${c}" onclick="pickC('${c}',this)"></div>`
  ).join('');
}
function pickC(c,el){aColor=c;document.querySelectorAll('.cs').forEach(s=>s.classList.remove('sel'));el.classList.add('sel');document.getElementById('cc').value=c;}
function setCC(c){aColor=c;document.querySelectorAll('.cs').forEach(s=>s.classList.remove('sel'));}
function saveFav(){if(!favColors.includes(aColor)){favColors.push(aColor);saveFavData();renderFavRow();toast('Colour saved ♥');}}
function renderFavRow(){document.getElementById('fav-row').innerHTML=favColors.map(c=>`<div class="fav-dot" style="background:${c}" onclick="pickC('${c}',this)" title="${c}"></div>`).join('');}

function saveTask(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){
    const inp=document.getElementById('f-title');
    inp.style.borderColor='var(--danger)';inp.focus();
    setTimeout(()=>inp.style.borderColor='',1200);
    return;
  }
  const startDate=document.getElementById('f-sd').value||null;
  const dueDate=document.getElementById('f-dd').value||null;
  // A task is unscheduled only if it has NO start date AND no due date
  const isUnscheduled=!startDate&&!dueDate;

  const data={
    title,
    desc:document.getElementById('f-desc').value.trim(),
    notes:document.getElementById('f-notes').value.trim(),
    startDate,
    dueDate,
    startTime:document.getElementById('f-ts').value||'',
    endTime:document.getElementById('f-te').value||'',
    category:document.getElementById('f-cat').value,
    recur:document.getElementById('f-rec').value,
    duration:document.getElementById('f-dur').value,
    reminder:document.getElementById('f-rem').value,
    priority:aPri,
    color:aColor,
    unscheduled:isUnscheduled,
  };

  if(editingId){
    const idx=tasks.findIndex(x=>x.id===editingId);
    if(idx>-1){tasks[idx]={...tasks[idx],...data};}
    toast('Task updated ✓');
  } else {
    tasks.push({id:nid++,...data,done:false,archived:false});
    toast('Task created ✓');
  }
  saveData();
  closeModal();
  render();
}
function delTask(){
  if(!confirm('Delete this task?'))return;
  tasks=tasks.filter(x=>x.id!==editingId);
  saveData();closeModal();toast('Task deleted');render();
}
function dupTask(){
  const t=tasks.find(x=>x.id===editingId);
  if(!t)return;
  tasks.push({...t,id:nid++,title:t.title+' (copy)',done:false});
  saveData();closeModal();toast('Task duplicated');render();
}

// ── TASK POPUP ────────────────────────────────────────────────────────────────
function showPop(e,id){
  e.stopPropagation();
  closePop();
  const t=tasks.find(x=>x.id===id);
  if(!t)return;
  const pop=document.createElement('div');
  pop.className='tpop';
  pop.innerHTML=`
    <div style="display:flex;align-items:flex-start;gap:7px;margin-bottom:7px">
      <div style="width:9px;height:9px;border-radius:50%;background:${t.color};flex-shrink:0;margin-top:4px"></div>
      <div class="tpop-title" style="flex:1">${esc(t.title)}</div>
      <button class="ib" style="flex-shrink:0" onclick="closePop()"><i class="ti ti-x" style="font-size:14px"></i></button>
    </div>
    ${t.desc?`<div class="tpop-desc">${esc(t.desc)}</div>`:''}
    <div class="tpop-row"><i class="ti ti-tag"></i><span class="cpill" style="background:${rgba(CAT_C[t.category]||'#888',.15)};color:${CAT_C[t.category]||'#888'}">${t.category}</span></div>
    <div class="tpop-row"><i class="ti ti-flag" style="color:${PRI_C[t.priority]}"></i><span style="color:${PRI_C[t.priority]}">${t.priority} priority</span></div>
    ${t.startDate?`<div class="tpop-row"><i class="ti ti-calendar"></i>${fd(t.startDate)}${t.dueDate&&t.dueDate!==t.startDate?' → '+fd(t.dueDate):''}</div>`:''}
    ${t.startTime?`<div class="tpop-row"><i class="ti ti-clock"></i>${ft(t.startTime)}${t.endTime?' – '+ft(t.endTime):''}</div>`:''}
    ${t.duration?`<div class="tpop-row"><i class="ti ti-hourglass"></i>${dur2s(t.duration)}</div>`:''}
    ${t.recur!=='none'?`<div class="tpop-row"><i class="ti ti-repeat"></i>Repeats ${t.recur}</div>`:''}
    ${t.notes?`<div class="tpop-row" style="align-items:flex-start"><i class="ti ti-notes" style="margin-top:2px"></i><span style="font-size:10px;color:var(--text3)">${esc(t.notes)}</span></div>`:''}
    <div class="tpop-acts">
      <button class="tpa" onclick="toggleDone(${t.id})"><i class="ti ${t.done?'ti-rotate-clockwise':'ti-circle-check'}"></i>${t.done?'Undo':'Done'}</button>
      <button class="tpa" onclick="openModal(${t.id});closePop()"><i class="ti ti-edit"></i>Edit</button>
      <button class="tpa" onclick="archiveTask(${t.id})"><i class="ti ti-archive"></i></button>
      <button class="tpa tdg" onclick="quickDel(${t.id})"><i class="ti ti-trash"></i></button>
    </div>`;
  document.body.appendChild(pop);
  popEl=pop;
  const rect=e.target.getBoundingClientRect();
  let left=rect.right+8,top=rect.top;
  if(left+305>window.innerWidth)left=rect.left-303;
  if(top+320>window.innerHeight)top=window.innerHeight-325;
  pop.style.left=Math.max(6,left)+'px';
  pop.style.top=Math.max(6,top)+'px';
  setTimeout(()=>document.addEventListener('click',closePop,{once:true}),40);
}
function closePop(){if(popEl){popEl.remove();popEl=null;}}
function toggleDone(id){
  const t=tasks.find(x=>x.id===id);
  if(t){t.done=!t.done;saveData();toast(t.done?`"${t.title}" done ✓`:'Task reopened');}
  closePop();render();
}
function quickDel(id){
  tasks=tasks.filter(x=>x.id!==id);
  saveData();closePop();toast('Task deleted');render();
}
function archiveTask(id){
  const t=tasks.find(x=>x.id===id);
  if(t){t.archived=true;saveData();toast(`"${t.title}" archived`);}
  closePop();render();
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function openSet(){document.getElementById('set-ov').classList.add('open');}
function closeSet(){document.getElementById('set-ov').classList.remove('open');}
function setBgClick(e){if(e.target===document.getElementById('set-ov'))closeSet();}
function applyTheme(){
  const dark=document.getElementById('tog-dark').checked;
  const hc=document.getElementById('tog-hc').checked;
  document.documentElement.dataset.theme=hc?'hc':dark?'dark':'light';
}
function setFS(sz,btn){document.body.style.fontSize=sz;document.querySelectorAll('.szb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function toggleSB(){sbOpen=!sbOpen;const sb=document.getElementById('sidebar');sb.style.width=sbOpen?'var(--sidebar-w)':'0';}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function navigate(dir){
  if(curView==='month')curDate=new Date(curDate.getFullYear(),curDate.getMonth()+dir,1);
  else if(curView==='week'){curDate=new Date(curDate);curDate.setDate(curDate.getDate()+dir*7);}
  else{curDate=new Date(curDate);curDate.setDate(curDate.getDate()+dir);}
  render();
}
function goToday(){curDate=new Date(TODAY_DATE);render();}
function setView(v){
  curView=v;
  document.querySelectorAll('.vt').forEach(b=>b.classList.remove('active'));
  document.getElementById('vt-'+v).classList.add('active');
  render();
}
function jumpTo(dStr){curDate=pd(dStr);miniDate=new Date(curDate.getFullYear(),curDate.getMonth(),1);render();}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2600);
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  const inp=e.target.matches('input,textarea,select');
  if(e.key==='Escape'){
    if(document.getElementById('mo').classList.contains('open')){closeModal();return;}
    if(document.getElementById('exp-ov').classList.contains('open')){closeExp();return;}
    if(document.getElementById('set-ov').classList.contains('open')){closeSet();return;}
    closePop();return;
  }
  if(inp)return;
  if(e.key==='ArrowLeft')navigate(-1);
  if(e.key==='ArrowRight')navigate(1);
  if(e.key==='t'||e.key==='T')goToday();
  if(e.key==='n'||e.key==='N')openModal(null,null);
  if(e.key==='m')setView('month');
  if(e.key==='w')setView('week');
  if(e.key==='d')setView('day');
  if(e.key==='a')setView('agenda');
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();document.getElementById('search-inp').focus();}
});

// ── INIT ──────────────────────────────────────────────────────────────────────
loadData();
render();
</script>
