<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planr — Smart Calendar & Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;
  --surface:#ffffff;
  --surface2:#f0efe9;
  --surface3:#e8e6de;
  --border:#e2e0d8;
  --border2:#ccc9be;
  --text:#1a1916;
  --text2:#6b6860;
  --text3:#9c9a94;
  --accent:#2563eb;
  --accent2:#7c3aed;
  --accent-light:#eff6ff;
  --danger:#dc2626;
  --danger-light:#fef2f2;
  --success:#16a34a;
  --success-light:#f0fdf4;
  --warning:#d97706;
  --warning-light:#fffbeb;
  --radius:10px;
  --radius-lg:14px;
  --radius-xl:20px;
  --shadow:0 1px 4px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.12),0 2px 8px rgba(0,0,0,0.08);
  --font:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
  --topbar-h:56px;
  --statsbar-h:44px;
  --filterbar-h:44px;
  --sidebar-w:268px;
}
[data-theme="dark"]{
  --bg:#111110;
  --surface:#1c1b19;
  --surface2:#252421;
  --surface3:#2e2d2a;
  --border:#2e2d2a;
  --border2:#3d3c38;
  --text:#f0efe9;
  --text2:#a8a69e;
  --text3:#6b6860;
  --accent:#3b82f6;
  --accent-light:#1e3a5f22;
  --danger-light:#3b0f0f;
  --success-light:#0d2b1a;
  --warning-light:#2d1f08;
  --shadow:0 1px 4px rgba(0,0,0,0.3),0 4px 16px rgba(0,0,0,0.25);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.4),0 2px 8px rgba(0,0,0,0.3);
}
[data-theme="high-contrast"]{
  --bg:#000000;--surface:#0a0a0a;--surface2:#111;--surface3:#1a1a1a;
  --border:#444;--border2:#666;--text:#ffffff;--text2:#cccccc;--text3:#999;
  --accent:#60a5fa;--accent-light:#00003a;
}

html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:var(--font);font-size:14px;color:var(--text);background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;outline:none;width:100%;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
textarea{resize:vertical;min-height:72px}
select option{background:var(--surface);color:var(--text)}
a{color:var(--accent);text-decoration:none}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{height:var(--topbar-h);display:flex;align-items:center;gap:10px;padding:0 16px;background:var(--surface);border-bottom:1px solid var(--border);z-index:200;flex-shrink:0}
.stats-bar{height:var(--statsbar-h);display:flex;align-items:center;gap:8px;padding:0 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.filter-bar{height:var(--filterbar-h);display:flex;align-items:center;gap:6px;padding:0 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.body-wrap{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .2s}
.sidebar.collapsed{width:0}
.main-area{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg)}
.cal-wrap{flex:1;overflow:hidden;padding:10px 12px 10px 12px;display:flex;flex-direction:column}

/* ── TOPBAR ── */
.logo{font-size:20px;font-weight:600;letter-spacing:-0.5px;white-space:nowrap}
.logo em{color:var(--accent);font-style:normal}
.topbar-sep{width:1px;height:24px;background:var(--border);flex-shrink:0}
.view-tabs{display:flex;gap:2px;background:var(--surface2);border-radius:9px;padding:3px}
.view-tab{padding:5px 12px;border-radius:7px;font-size:12px;font-weight:500;color:var(--text2);transition:all .15s;white-space:nowrap}
.view-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.view-tab:hover:not(.active){color:var(--text)}
.period-nav{display:flex;align-items:center;gap:6px;margin:0 4px}
.period-label{font-size:15px;font-weight:600;letter-spacing:-0.3px;min-width:200px;text-align:center;white-space:nowrap}
.nav-arrow{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text2);transition:background .12s,color .12s}
.nav-arrow:hover{background:var(--surface2);color:var(--text)}
.today-btn{padding:6px 14px;border-radius:8px;background:var(--accent);color:#fff;font-size:13px;font-weight:500;white-space:nowrap;transition:opacity .15s}
.today-btn:hover{opacity:.88}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.icon-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text2);transition:background .12s,color .12s;flex-shrink:0}
.icon-btn:hover{background:var(--surface2);color:var(--text)}
.search-box{position:relative;flex-shrink:0}
.search-box input{padding-left:32px;width:200px;height:32px;font-size:13px;border-radius:8px}
.search-box .ti-search{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text3);pointer-events:none}
.add-main-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;background:var(--accent);color:#fff;font-size:13px;font-weight:500;transition:opacity .15s;white-space:nowrap}
.add-main-btn:hover{opacity:.88}

/* ── STATS BAR ── */
.stat-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:16px;font-size:12px;font-weight:500;color:var(--text2);background:var(--surface2);border:1px solid var(--border);white-space:nowrap;cursor:default;flex-shrink:0}
.stat-chip strong{color:var(--text)}
.stat-chip .ti{font-size:13px}
.stat-chip.clickable{cursor:pointer;transition:background .12s}
.stat-chip.clickable:hover{background:var(--surface3)}

/* ── FILTER BAR ── */
.filter-chip{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:500;border:1px solid var(--border);color:var(--text2);background:transparent;cursor:pointer;transition:all .12s;white-space:nowrap;flex-shrink:0}
.filter-chip:hover{background:var(--surface2);color:var(--text)}
.filter-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.filter-sep{width:1px;height:20px;background:var(--border);flex-shrink:0;margin:0 4px}
.filter-right{margin-left:auto;font-size:12px;color:var(--text3);white-space:nowrap;flex-shrink:0}

/* ── SIDEBAR ── */
.sidebar-section{display:flex;flex-direction:column;overflow:hidden;flex:1}
.sidebar-head{padding:12px 14px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sidebar-head-title{font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--text3)}
.add-unscheduled-btn{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:7px;background:var(--surface2);color:var(--text2);font-size:12px;font-weight:500;border:1px solid var(--border);transition:all .12s}
.add-unscheduled-btn:hover{background:var(--surface3);color:var(--text)}
.sidebar-tasks-list{flex:1;overflow-y:auto;padding:0 10px 10px}
.sidebar-task-card{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--border2);border-radius:var(--radius);padding:9px 11px;margin-bottom:6px;cursor:grab;transition:box-shadow .15s,transform .15s,border-color .15s;position:relative;user-select:none}
.sidebar-task-card:active{cursor:grabbing}
.sidebar-task-card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.sidebar-task-card.dragging{opacity:.45;transform:scale(.97)}
.stc-title{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;margin-bottom:4px}
.stc-meta{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pri-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.cat-pill{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
.sidebar-empty{text-align:center;padding:28px 16px;color:var(--text3);font-size:12px;line-height:1.7}
.sidebar-empty .ti{font-size:28px;display:block;margin-bottom:6px;opacity:.35}
.sidebar-drop-zone{min-height:60px;margin:0 10px 10px;border:2px dashed var(--border);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text3);transition:all .15s;flex-shrink:0}
.sidebar-drop-zone.drag-active{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}

/* ── MINI CALENDAR ── */
.mini-cal-wrap{padding:10px 14px 14px;border-top:1px solid var(--border);flex-shrink:0}
.mini-cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.mini-cal-title{font-size:12px;font-weight:600;color:var(--text)}
.mini-nav-btn{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text2);transition:background .1s}
.mini-nav-btn:hover{background:var(--surface2);color:var(--text)}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.mini-dl{font-size:9px;color:var(--text3);text-align:center;padding:2px 0;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.mini-d{font-size:11px;text-align:center;padding:3px 1px;border-radius:5px;cursor:pointer;color:var(--text2);transition:background .1s,color .1s;line-height:1.4}
.mini-d:hover{background:var(--surface2);color:var(--text)}
.mini-d.is-today{background:var(--accent);color:#fff!important;font-weight:600}
.mini-d.is-selected:not(.is-today){background:var(--accent-light);color:var(--accent);font-weight:600}
.mini-d.other-month{opacity:.35}
.mini-d.has-tasks::after{content:'';display:block;width:3px;height:3px;border-radius:50%;background:currentColor;margin:0 auto;opacity:.5}

/* ── MONTH GRID ── */
.month-day-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:4px;flex-shrink:0}
.mdl{text-align:center;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:3px 0}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;flex:1}
.day-cell{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:7px 8px;display:flex;flex-direction:column;overflow:hidden;cursor:default;transition:border-color .15s,box-shadow .15s;position:relative;min-height:0}
.day-cell:hover{border-color:var(--border2)}
.day-cell.is-today{border-color:var(--accent);border-width:2px}
.day-cell.is-today .day-num-inner{background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.day-cell.other-month{opacity:.4}
.day-cell.drag-over{background:var(--accent-light)!important;border-color:var(--accent)!important;border-width:2px}
.day-cell.is-weekend{background:var(--surface2)}
.day-num-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;flex-shrink:0}
.day-num-inner{font-size:12px;font-weight:600;line-height:1}
.day-actions{display:flex;align-items:center;gap:2px;opacity:0;transition:opacity .15s}
.day-cell:hover .day-actions{opacity:1}
.day-action-btn{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text3);transition:background .1s,color .1s}
.day-action-btn:hover{background:var(--surface2);color:var(--text)}
.day-tasks-list{display:flex;flex-direction:column;gap:2px;flex:1;overflow:hidden}
.task-chip{display:flex;align-items:center;gap:4px;font-size:11px;padding:2px 6px;border-radius:5px;cursor:pointer;font-weight:500;overflow:hidden;white-space:nowrap;flex-shrink:0;transition:opacity .12s;user-select:none}
.task-chip:hover{opacity:.8}
.task-chip.done-chip{text-decoration:line-through;opacity:.45}
.task-chip .tc-pri{font-size:8px;flex-shrink:0}
.tc-txt{overflow:hidden;text-overflow:ellipsis;flex:1}
.chip-time{font-size:9px;opacity:.7;font-family:var(--mono);flex-shrink:0}
.more-link{font-size:10px;color:var(--text3);cursor:pointer;padding:1px 4px;border-radius:3px;flex-shrink:0}
.more-link:hover{background:var(--surface2);color:var(--text2)}
.heat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── DAY EXPANDED OVERLAY ── */
.day-expanded-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.day-expanded-overlay.open{display:flex}
.day-expanded-panel{background:var(--surface);border-radius:var(--radius-xl);width:100%;max-width:600px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow-lg)}
.dep-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.dep-title{font-size:17px;font-weight:600;letter-spacing:-.3px}
.dep-subtitle{font-size:12px;color:var(--text3);margin-top:1px}
.dep-header-actions{display:flex;gap:6px;align-items:center}
.dep-body{flex:1;overflow-y:auto;padding:16px 20px}
.dep-allday{margin-bottom:14px}
.dep-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:6px}
.timeline-wrap{display:flex;flex-direction:column}
.timeline-row{display:flex;align-items:stretch;min-height:44px;border-top:1px dashed var(--border)}
.timeline-row:first-child{border-top:none}
.t-time{font-size:10px;font-family:var(--mono);color:var(--text3);width:40px;flex-shrink:0;padding-top:4px}
.t-tasks{flex:1;display:flex;flex-direction:column;gap:3px;padding:3px 0}
.t-task-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:7px;cursor:pointer;transition:opacity .12s;font-size:13px;font-weight:500}
.t-task-item:hover{opacity:.85}
.t-task-item.is-done{text-decoration:line-through;opacity:.4}
.tti-dur{font-size:11px;opacity:.6;margin-left:auto;font-family:var(--mono)}
.dep-empty{text-align:center;padding:32px;color:var(--text3);font-size:13px}
.dep-add-slot{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:7px;font-size:12px;color:var(--text3);cursor:pointer;transition:background .12s;border:1px dashed transparent}
.dep-add-slot:hover{background:var(--surface2);border-color:var(--border);color:var(--text2)}

/* ── WEEK VIEW ── */
.week-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--border);border-radius:var(--radius-lg)}
.week-header-grid{display:grid;grid-template-columns:52px repeat(7,1fr);background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.week-corner{border-right:1px solid var(--border)}
.week-day-col-head{padding:10px 8px;text-align:center;border-left:1px solid var(--border)}
.wdch-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3)}
.wdch-num{font-size:22px;font-weight:300;line-height:1.1;color:var(--text)}
.wdch-num.today-num{color:var(--accent);font-weight:600}
.week-body-scroll{flex:1;overflow-y:auto;display:grid;grid-template-columns:52px repeat(7,1fr)}
.week-time-col{display:flex;flex-direction:column;border-right:1px solid var(--border)}
.week-hour-label{height:52px;padding:2px 6px;font-size:10px;font-family:var(--mono);color:var(--text3);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:flex-start}
.week-day-col{border-left:1px solid var(--border);position:relative;display:flex;flex-direction:column}
.week-day-col.today-wcol{background:var(--accent-light)}
.week-hour-cell{height:52px;border-bottom:1px solid var(--border);padding:2px;flex-shrink:0;display:flex;flex-direction:column;gap:2px}
.wh-chip{font-size:10px;padding:2px 5px;border-radius:4px;cursor:pointer;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;transition:opacity .12s}
.wh-chip:hover{opacity:.8}

/* ── DAY VIEW ── */
.day-view-wrap{flex:1;overflow-y:auto;padding:4px 0}
.dv-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.dv-title{font-size:16px;font-weight:600;letter-spacing:-.3px}
.dv-subtitle{font-size:12px;color:var(--text3);margin-top:2px}
.dv-allday{padding:10px 16px;border-bottom:1px solid var(--border)}
.dv-timeline{display:flex;flex-direction:column;padding:0}
.dv-row{display:flex;align-items:stretch;min-height:60px;border-top:1px solid var(--border)}
.dv-row:first-child{border-top:none}
.dv-time{width:64px;flex-shrink:0;padding:8px 10px;font-size:11px;font-family:var(--mono);color:var(--text3)}
.dv-slot{flex:1;padding:4px 8px;display:flex;flex-direction:column;gap:4px;cursor:pointer;transition:background .1s}
.dv-slot:hover{background:var(--surface2)}
.dv-task{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:500;transition:opacity .12s}
.dv-task:hover{opacity:.85}
.dv-task.is-done{text-decoration:line-through;opacity:.4}

/* ── AGENDA VIEW ── */
.agenda-wrap{flex:1;overflow-y:auto;padding:4px 8px}
.agenda-day{margin-bottom:20px}
.agenda-day-head{display:flex;align-items:center;gap:10px;padding:10px 8px 8px;border-bottom:1px solid var(--border);margin-bottom:8px}
.adh-date{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.adh-today-badge{font-size:10px;padding:2px 8px;border-radius:4px;background:var(--accent);color:#fff;font-weight:700;text-transform:none;letter-spacing:0}
.agenda-task-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;cursor:pointer;transition:background .12s;margin-bottom:4px;border-left:3px solid transparent}
.agenda-task-row:hover{background:var(--surface2)}
.agenda-task-row.is-done{opacity:.45}
.atr-info{flex:1;min-width:0}
.atr-title{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.atr-time{font-size:11px;color:var(--text3);font-family:var(--mono)}
.agenda-empty{text-align:center;padding:48px 20px;color:var(--text3)}
.agenda-empty .ti{font-size:48px;display:block;margin-bottom:12px;opacity:.25}

/* ── DASHBOARD ── */
.dashboard-wrap{flex:1;overflow-y:auto;padding:16px}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:16px}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.dash-card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:10px}
.dash-stat{font-size:32px;font-weight:300;color:var(--text);letter-spacing:-1px;line-height:1}
.dash-stat-label{font-size:12px;color:var(--text3);margin-top:3px}
.dash-task-list{display:flex;flex-direction:column;gap:6px}
.dash-task-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;background:var(--surface2);font-size:13px;cursor:pointer;transition:background .12s}
.dash-task-row:hover{background:var(--surface3)}
.dash-task-row.done-row{opacity:.45;text-decoration:line-through}
.dash-wide{grid-column:1/-1}
.chart-wrap{position:relative;height:180px}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal-box{background:var(--surface);border-radius:var(--radius-xl);width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-head{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:10}
.modal-head-title{font-size:16px;font-weight:600;letter-spacing:-.3px}
.modal-body{padding:20px 24px}
.modal-foot{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center}
.modal-foot-right{margin-left:auto;display:flex;gap:8px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--text2);margin-bottom:6px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:1.5px solid transparent;font-family:var(--font)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{opacity:.88}
.btn-secondary{background:var(--surface2);color:var(--text);border-color:var(--border)}
.btn-secondary:hover{background:var(--surface3)}
.btn-danger{background:transparent;color:var(--danger);border-color:var(--danger)}
.btn-danger:hover{background:var(--danger-light)}
.btn-ghost{background:transparent;color:var(--text2);border-color:var(--border)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}

/* ── COLOR PICKER ── */
.color-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;margin-top:6px}
.cs{width:26px;height:26px;border-radius:7px;cursor:pointer;transition:transform .12s,box-shadow .12s;border:2px solid transparent}
.cs:hover{transform:scale(1.12)}
.cs.selected{box-shadow:0 0 0 2px var(--surface),0 0 0 4px var(--text)}
.custom-color-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.custom-color-row input[type=color]{width:32px;height:32px;border-radius:7px;padding:2px;cursor:pointer;flex-shrink:0;border:1.5px solid var(--border);background:var(--surface2)}
.fav-colors{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.fav-color-dot{width:20px;height:20px;border-radius:5px;cursor:pointer;border:1.5px solid transparent;transition:transform .1s}
.fav-color-dot:hover{transform:scale(1.15)}

/* ── PRIORITY ── */
.pri-row{display:flex;gap:8px}
.pri-btn{flex:1;padding:8px 6px;border-radius:9px;border:1.5px solid var(--border);cursor:pointer;text-align:center;font-size:12px;font-weight:600;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;font-family:var(--font)}
.pri-btn.ph{color:var(--danger)}
.pri-btn.pm{color:var(--warning)}
.pri-btn.pl{color:var(--success)}
.pri-btn.ph.sel{background:var(--danger-light);border-color:var(--danger)}
.pri-btn.pm.sel{background:var(--warning-light);border-color:var(--warning)}
.pri-btn.pl.sel{background:var(--success-light);border-color:var(--success)}

/* ── TASK POPUP ── */
.task-popup{position:fixed;z-index:400;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:310px;padding:16px;animation:popIn .15s ease}
@keyframes popIn{from{opacity:0;transform:scale(.96) translateY(4px)}to{opacity:1;transform:none}}
.tp-title{font-size:15px;font-weight:600;margin-bottom:10px;line-height:1.3}
.tp-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);margin-bottom:5px}
.tp-row .ti{font-size:14px;flex-shrink:0}
.tp-desc{font-size:12px;color:var(--text3);margin-bottom:8px;line-height:1.5}
.tp-actions{display:flex;gap:5px;padding-top:12px;border-top:1px solid var(--border);margin-top:10px}
.tpa{flex:1;padding:6px 4px;border-radius:7px;font-size:11px;font-weight:600;border:1px solid var(--border);cursor:pointer;transition:background .1s;display:flex;align-items:center;justify-content:center;gap:3px;color:var(--text2);background:var(--surface2);font-family:var(--font)}
.tpa:hover{background:var(--surface3);color:var(--text)}
.tpa.danger{color:var(--danger)}
.tpa.danger:hover{background:var(--danger-light)}

/* ── NOTIF TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:var(--surface);padding:10px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:600;transform:translateY(12px);opacity:0;transition:all .25s;pointer-events:none;display:flex;align-items:center;gap:8px;max-width:320px;box-shadow:var(--shadow-lg)}
.toast.visible{transform:translateY(0);opacity:1}

/* ── SETTINGS PANEL ── */
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:450;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.settings-overlay.open{display:flex}
.settings-panel{background:var(--surface);border-radius:var(--radius-xl);width:100%;max-width:420px;box-shadow:var(--shadow-lg);overflow:hidden}
.settings-head{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.settings-body{padding:18px 22px;display:flex;flex-direction:column;gap:16px}
.setting-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.setting-label{font-size:13px;font-weight:500;color:var(--text)}
.setting-sub{font-size:11px;color:var(--text3);margin-top:1px}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle input{display:none}
.toggle-track{display:block;width:40px;height:22px;border-radius:11px;background:var(--surface3);border:1px solid var(--border);cursor:pointer;transition:background .2s}
.toggle input:checked + .toggle-track{background:var(--accent);border-color:var(--accent)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s;pointer-events:none;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked ~ .toggle-thumb{transform:translateX(18px)}
.size-btns{display:flex;gap:4px}
.size-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);background:transparent;color:var(--text2);transition:all .12s}
.size-btn.active,.size-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
</style>
</head>
<body>
<div id="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">Plan<em>r</em></div>
    <div class="topbar-sep"></div>
    <div class="view-tabs">
      <button class="view-tab active" onclick="setView('month')" id="vt-month">Month</button>
      <button class="view-tab" onclick="setView('week')" id="vt-week">Week</button>
      <button class="view-tab" onclick="setView('day')" id="vt-day">Day</button>

      <button class="view-tab" onclick="setView('dashboard')" id="vt-dashboard">Dashboard</button>

    <button class="today-btn" onclick="goToday()">Today</button>
    <div class="topbar-right">

        <i class="ti ti-search"></i>

      </div>
      <button class="icon-btn" onclick="toggleSidebar()" title="Toggle sidebar"><i class="ti ti-layout-sidebar"></i></button>
      <button class="icon-btn" onclick="openSettings()" title="Settings"><i class="ti ti-settings"></i></button>
      <button class="add-main-btn" onclick="openModal(null,null)"><i class="ti ti-plus"></i> New Task</button>
    </div>
  </div>

  <!-- STATS BAR -->
  <div class="stats-bar" id="stats-bar"></div>

  <!-- FILTER BAR -->
  <div class="filter-bar" id="filter-bar"></div>

  <!-- BODY -->
  <div class="body-wrap">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-head">
          <span class="sidebar-head-title">Task Bank</span>
          <button class="add-unscheduled-btn" onclick="openModal(null,null,'unscheduled')">
            <i class="ti ti-plus"></i> Add
          </button>
        </div>
        <div class="sidebar-tasks-list" id="sidebar-task-list"></div>
        <div class="sidebar-drop-zone" id="sidebar-drop-zone" ondragover="e=>{e.preventDefault();this.classList.add('drag-active')}" ondragleave="this.classList.remove('drag-active')" ondrop="sidebarDrop(event)">
          <i class="ti ti-inbox" style="margin-right:5px"></i> Drop here to unschedule
        </div>
      </div>
      <div class="mini-cal-wrap" id="mini-cal"></div>
    </div>

    <!-- MAIN -->
    <div class="main-area">
      <div class="cal-wrap" id="cal-wrap"></div>
    </div>
  </div>
</div>

<!-- DAY EXPANDED OVERLAY -->
<div class="day-expanded-overlay" id="dep-overlay" onclick="depBgClick(event)">
  <div class="day-expanded-panel" id="dep-panel">
    <div class="dep-header">
      <div>
        <div class="dep-title" id="dep-title"></div>
        <div class="dep-subtitle" id="dep-subtitle"></div>
      </div>
      <div class="dep-header-actions">
        <button class="btn btn-primary" id="dep-add-btn" style="padding:6px 12px;font-size:12px"><i class="ti ti-plus"></i> Add Task</button>
        <button class="icon-btn" onclick="closeDep()"><i class="ti ti-x"></i></button>
      </div>
    </div>
    <div class="dep-body" id="dep-body"></div>
  </div>
</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="modalBgClick(event)">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-head-title" id="modal-title">New Task</div>
      <button class="icon-btn" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input type="text" id="f-title" placeholder="What needs to be done?">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="f-desc" placeholder="Add details…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Priority</label>
        <div class="pri-row">
          <button class="pri-btn ph" onclick="selPri('high',this)"><i class="ti ti-alert-triangle"></i> High</button>
          <button class="pri-btn pm sel" onclick="selPri('medium',this)"><i class="ti ti-minus"></i> Medium</button>
          <button class="pri-btn pl" onclick="selPri('low',this)"><i class="ti ti-arrow-down"></i> Low</button>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Start Date</label>
          <input type="date" id="f-start">
        </div>
        <div class="form-group">
          <label class="form-label">Due Date</label>
          <input type="date" id="f-due">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Start Time</label>
          <input type="time" id="f-time-s">
        </div>
        <div class="form-group">
          <label class="form-label">End Time</label>
          <input type="time" id="f-time-e">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select id="f-cat">
            <option>School</option><option>Work</option><option>Personal</option>
            <option>Health</option><option>Finance</option><option>Social</option>
            <option>Study</option><option>Fitness</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Recurring</label>
          <select id="f-recur">
            <option value="none">None</option>
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
            <option value="yearly">Yearly</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Estimated Duration</label>
        <select id="f-dur">
          <option value="">None</option>
          <option value="15">15 mins</option>
          <option value="30">30 mins</option>
          <option value="45">45 mins</option>
          <option value="60">1 hour</option>
          <option value="90">1.5 hours</option>
          <option value="120">2 hours</option>
          <option value="180">3 hours</option>
          <option value="240">4 hours</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Colour</label>
        <div class="color-grid" id="color-grid"></div>
        <div class="custom-color-row">
          <input type="color" id="custom-color" value="#2563eb" oninput="setCustomColor(this.value)">
          <span style="font-size:12px;color:var(--text3)">Custom colour</span>
          <button class="btn btn-ghost" style="font-size:11px;padding:4px 8px;margin-left:auto" onclick="saveFavColor()"><i class="ti ti-heart"></i> Save</button>
        </div>
        <div id="fav-colors-row" style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Reminder</label>
        <select id="f-reminder">
          <option value="none">None</option>
          <option value="5">5 mins before</option>
          <option value="15">15 mins before</option>
          <option value="30">30 mins before</option>
          <option value="60">1 hour before</option>
          <option value="1440">1 day before</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea id="f-notes" placeholder="Additional notes…"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-danger" id="delete-btn" onclick="deleteTask()" style="display:none"><i class="ti ti-trash"></i> Delete</button>
      <button class="btn btn-secondary" id="dupe-btn" onclick="dupeTask()" style="display:none"><i class="ti ti-copy"></i> Duplicate</button>
      <div class="modal-foot-right">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveTask()"><i class="ti ti-check"></i> Save Task</button>
      </div>
    </div>
  </div>
</div>

<!-- SETTINGS OVERLAY -->
<div class="settings-overlay" id="settings-overlay" onclick="settingsBgClick(event)">
  <div class="settings-panel">
    <div class="settings-head">
      <span style="font-size:15px;font-weight:600">Settings</span>
      <button class="icon-btn" onclick="closeSettings()"><i class="ti ti-x"></i></button>
    </div>
    <div class="settings-body">
      <div class="setting-row">
        <div>
          <div class="setting-label">Dark Mode</div>
          <div class="setting-sub">Switch to dark theme</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="toggle-dark" onchange="applyTheme()">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">High Contrast</div>
          <div class="setting-sub">Accessible colour mode</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="toggle-hc" onchange="applyTheme()">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">Show Weekends</div>
          <div class="setting-sub">Display Sat & Sun in month view</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="toggle-weekends" checked onchange="render()">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">Show Heatmap</div>
          <div class="setting-sub">Workload indicators on days</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="toggle-heat" checked onchange="render()">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">Text Size</div>
        </div>
        <div class="size-btns">
          <button class="size-btn" onclick="setFontSize('13px',this)">S</button>
          <button class="size-btn active" onclick="setFontSize('14px',this)">M</button>
          <button class="size-btn" onclick="setFontSize('15px',this)">L</button>
        </div>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">Sort Sidebar By</div>
        </div>
        <select id="sort-mode" style="width:140px" onchange="renderSidebar()">
          <option value="added">Date Added</option>
          <option value="priority">Priority</option>
          <option value="category">Category</option>
        </select>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
const PRESET_COLORS = [
  '#ef4444','#f97316','#f59e0b','#eab308','#84cc16',
  '#22c55e','#10b981','#14b8a6','#06b6d4','#0ea5e9',
  '#3b82f6','#6366f1','#8b5cf6','#a855f7','#ec4899',
  '#f43f5e','#64748b','#0891b2','#059669','#d97706'
];
const CAT_HEX = {
  School:'#3b82f6',Work:'#8b5cf6',Personal:'#10b981',Health:'#ef4444',
  Finance:'#f59e0b',Social:'#ec4899',Study:'#06b6d4',Fitness:'#f97316'
};
const PRI_HEX = {high:'#ef4444',medium:'#f59e0b',low:'#22c55e'};
const PRI_ORDER = {high:0,medium:1,low:2};

const TODAY = new Date(2025,5,3); // June 3 2025
let tasks = [
  mk(1,'Maths mock revision','Past papers chapters 5-8','#3b82f6','high','Study','2025-06-02','2025-06-02','09:00','11:00',false,'Focus on integration by parts and substitution','none',false,'60'),
  mk(2,'Economics essay draft','Chapter 4 supply & demand analysis','#8b5cf6','medium','School','2025-06-03','2025-06-05','14:00','16:00',false,'Use Keynes model','none',false,'120'),
  mk(3,'Gym session','Chest and shoulders','#f97316','low','Fitness','2025-06-04','2025-06-04','07:00','08:30',false,'','weekly',false,'90'),
  mk(4,'Personal statement draft','Start with opening hook','#ec4899','high','School','2025-06-10','2025-06-15','10:00','12:00',false,'Oxford E&M focus','none',false,'120'),
  mk(5,'Computing coursework','Finish section B of NEA','#06b6d4','high','School',null,null,'','',false,'Talk to Mr McCrink','none',true,'180'),
  mk(6,'Call parents','Weekend catch-up','#10b981','low','Personal',null,null,'','',false,'','none',true,'30'),
  mk(7,'Weekly planning review','Set goals and review tasks','#f59e0b','medium','Work','2025-06-09','2025-06-09','08:00','08:30',false,'','weekly',false,'30'),
  mk(8,'Further maths problems','Sequences and series sheet 3','#6366f1','high','Study','2025-06-06','2025-06-06','15:00','17:00',false,'Focus on proof by induction','none',false,'120'),
  mk(9,'Read economics textbook','Chapter 6 market failure','#84cc16','low','Study','2025-06-11','2025-06-11','19:00','20:00',false,'','none',false,'60'),
  mk(10,'Sleep & hydration log','Daily health tracking','#14b8a6','medium','Health','2025-06-03','2025-06-30','22:00','22:15',false,'','daily',false,'15'),
  mk(11,'Revision for Computing mock','OCR exam preparation','#a855f7','high','Study','2025-06-16','2025-06-18','10:00','13:00',false,'Focus on algorithms','none',false,'180'),
  mk(12,'Dentist appointment','Check-up and clean','#64748b','medium','Health','2025-06-20','2025-06-20','11:00','12:00',false,'Remember to brush before!','none',false,'60'),
  mk(13,'MAT practice paper','Oxford admissions prep','#0ea5e9','high','Study','2025-06-25','2025-06-25','09:00','12:00',false,'Section A focus','none',false,'180'),
  mk(14,'Bank account review','Check finances for uni','#f59e0b','medium','Finance',null,null,'','',false,'','none',true,'30'),
  mk(15,'Piano practice','Self-composed piece run-through','#ec4899','low','Personal','2025-06-07','2025-06-07','17:00','18:00',false,'TikTok take?','none',false,'60'),
];
let nextId = 16;
let favColors = [];
let editingId = null;
let currentView = 'month';
let currentDate = new Date(2025,5,3);
let miniDate = new Date(2025,5,1);
let sidebarOpen = true;
let activeFilter = 'all';
let searchQ = '';
let dragId = null;
let activePri = 'medium';
let activeColor = PRESET_COLORS[10];
let popupEl = null;

function mk(id,title,desc,color,priority,category,startDate,dueDate,startTime,endTime,done,notes,recur,unscheduled,duration){
  return {id,title,desc,color,priority,category,startDate,dueDate,startTime,endTime,done,notes,recur:recur||'none',unscheduled:!!unscheduled,duration:duration||'',reminder:'none',archived:false};
}
function ds(d){if(!d)return null;return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function pd(s){if(!s)return null;const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function p2(n){return String(n).padStart(2,'0');}
function ft(t){if(!t)return '';const[h,m]=t.split(':').map(Number);return`${h%12||12}:${p2(m)}${h>=12?'pm':'am'}`;}
function fd(s){if(!s)return '';return pd(s).toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function dur2str(d){if(!d)return '';const n=parseInt(d);if(n<60)return n+'m';if(n%60===0)return(n/60)+'h';return Math.floor(n/60)+'h '+n%60+'m';}

// ─── FILTER / SEARCH ────────────────────────────────────────────────────────
function getFiltered(includeUnscheduled){
  return tasks.filter(t=>{
    if(t.archived)return false;
    if(!includeUnscheduled&&t.unscheduled)return false;
    if(searchQ){
      const q=searchQ.toLowerCase();
      if(!t.title.toLowerCase().includes(q)&&!t.category.toLowerCase().includes(q)&&!t.desc.toLowerCase().includes(q))return false;
    }
    switch(activeFilter){
      case 'done':return t.done;
      case 'undone':return !t.done;
      case 'high':return t.priority==='high'&&!t.done;
      case 'overdue':return t.dueDate&&!t.done&&pd(t.dueDate)<TODAY;
      case 'upcoming':return t.dueDate&&!t.done&&pd(t.dueDate)>=TODAY;
    }
    return true;
  });
}
function tasksOn(dateStr,all){
  return (all||getFiltered(false)).filter(t=>{
    if(t.unscheduled||t.archived)return false;
    const on=(s,e)=>dateStr>=s&&(!e||dateStr<=e);
    if(t.recur==='daily'&&t.startDate&&dateStr>=t.startDate)return true;
    if(t.recur==='weekly'&&t.startDate){const sd=pd(t.startDate),dd=pd(dateStr);return sd.getDay()===dd.getDay()&&dd>=sd;}
    if(t.recur==='monthly'&&t.startDate){const sd=pd(t.startDate),dd=pd(dateStr);return sd.getDate()===dd.getDate()&&dd>=sd;}
    if(t.startDate&&t.dueDate)return on(t.startDate,t.dueDate)||t.startDate===dateStr||t.dueDate===dateStr;
    return t.startDate===dateStr||t.dueDate===dateStr;
  });
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  renderStats();renderFilterBar();renderSidebar();renderMiniCal();renderPeriodLabel();
  const cw=document.getElementById('cal-wrap');
  cw.innerHTML='';
  if(currentView==='month')renderMonth(cw);
  else if(currentView==='week')renderWeek(cw);
  else if(currentView==='day')renderDay(cw);
  else if(currentView==='agenda')renderAgenda(cw);
  else renderDashboard(cw);
}

// ─── STATS ───────────────────────────────────────────────────────────────────
function renderStats(){
  const all=tasks.filter(t=>!t.archived);
  const done=all.filter(t=>t.done).length;
  const todayT=tasksOn(ds(TODAY),getFiltered(false)).length;
  const high=all.filter(t=>t.priority==='high'&&!t.done&&!t.unscheduled).length;
  const overdue=all.filter(t=>t.dueDate&&!t.done&&pd(t.dueDate)<TODAY).length;
  const unsched=all.filter(t=>t.unscheduled).length;
  const total=all.filter(t=>!t.unscheduled).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('stats-bar').innerHTML=`
    <div class="stat-chip"><i class="ti ti-check" style="color:var(--success)"></i><strong>${done}</strong> completed</div>
    <div class="stat-chip"><i class="ti ti-calendar-event"></i><strong>${todayT}</strong> today</div>
    <div class="stat-chip"><i class="ti ti-alert-triangle" style="color:var(--danger)"></i><strong>${high}</strong> high priority</div>
    <div class="stat-chip clickable" onclick="setFilter('overdue')" title="Click to filter"><i class="ti ti-clock" style="color:var(--warning)"></i><strong>${overdue}</strong> overdue</div>
    <div class="stat-chip"><i class="ti ti-inbox"></i><strong>${unsched}</strong> unscheduled</div>
    <div class="stat-chip" style="margin-left:auto"><i class="ti ti-chart-pie"></i><strong>${pct}%</strong> done this month</div>
  `;
}

// ─── FILTER BAR ──────────────────────────────────────────────────────────────
function renderFilterBar(){

    {id:'all',label:'All tasks'},
    {id:'undone',label:'Incomplete'},
    {id:'done',label:'Completed'},
    {id:'high',label:'⚑ High Priority'},
    {id:'overdue',label:'⏰ Overdue'},

  document.getElementById('filter-bar').innerHTML=
