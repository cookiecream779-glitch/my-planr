    `<div class="filter-sep"></div>`+
    `<span class="filter-right">${shown} tasks</span>`;
}
function setFilter(f){activeFilter=f;render();}
function onSearch(v){searchQ=v;render();}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
function renderSidebar(){
  let unscheduled=tasks.filter(t=>t.unscheduled&&!t.archived);
  if(searchQ){const q=searchQ.toLowerCase();unscheduled=unscheduled.filter(t=>t.title.toLowerCase().includes(q)||t.category.toLowerCase().includes(q));}
  const sort=document.getElementById('sort-mode')?.value||'added';
  if(sort==='priority')unscheduled.sort((a,b)=>PRI_ORDER[a.priority]-PRI_ORDER[b.priority]);
  else if(sort==='category')unscheduled.sort((a,b)=>a.category.localeCompare(b.category));
  const el=document.getElementById('sidebar-task-list');
  if(!unscheduled.length){
    el.innerHTML=`<div class="sidebar-empty"><i class="ti ti-inbox-off"></i>No unscheduled tasks.<br>Add tasks or drag scheduled ones here.</div>`;
    return;
  }
  el.innerHTML=unscheduled.map(t=>`
    <div class="sidebar-task-card" style="border-left-color:${t.color}" draggable="true"
      ondragstart="onDragStart(event,${t.id})" onclick="showPopup(event,${t.id})">
      <div class="stc-title">
        <span class="pri-dot" style="background:${PRI_HEX[t.priority]}"></span>
        ${esc(t.title)}
        ${t.done?'<i class="ti ti-check" style="font-size:12px;color:var(--success);margin-left:auto"></i>':''}
      </div>
      <div class="stc-meta">
        <span class="cat-pill" style="background:${rgba(CAT_HEX[t.category]||'#888',.15)};color:${CAT_HEX[t.category]||'#888'}">${t.category}</span>
        <span>${t.priority}</span>
        ${t.duration?`<span>${dur2str(t.duration)}</span>`:''}
      </div>
    </div>`).join('');
}

// ─── MINI CAL ────────────────────────────────────────────────────────────────
function renderMiniCal(){
  const y=miniDate.getFullYear(),m=miniDate.getMonth();
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const startDay=(first.getDay()+6)%7;
  const days=['M','T','W','T','F','S','S'];
  let cells='';
  const prevLast=new Date(y,m,0).getDate();
  for(let i=startDay-1;i>=0;i--){
    const d=prevLast-i;
    cells+=`<div class="mini-d other-month">${d}</div>`;
  }
  for(let d=1;d<=last.getDate();d++){
    const dStr=`${y}-${p2(m+1)}-${p2(d)}`;
    const isT=dStr===ds(TODAY),isSel=dStr===ds(currentDate);
    const has=tasksOn(dStr).length>0;
    cells+=`<div class="mini-d${isT?' is-today':isSel&&!isT?' is-selected':''}${has?' has-tasks':''}" onclick="jumpTo('${dStr}')">${d}</div>`;
  }
  const rem=(7-((startDay+last.getDate())%7))%7;
  for(let d=1;d<=rem;d++)cells+=`<div class="mini-d other-month">${d}</div>`;
  document.getElementById('mini-cal').innerHTML=`
    <div class="mini-cal-head">
      <span class="mini-cal-title">${first.toLocaleDateString('en-GB',{month:'short',year:'numeric'})}</span>
      <div style="display:flex;gap:2px">
        <button class="mini-nav-btn" onclick="miniNav(-1)"><i class="ti ti-chevron-left" style="font-size:13px"></i></button>
        <button class="mini-nav-btn" onclick="miniNav(1)"><i class="ti ti-chevron-right" style="font-size:13px"></i></button>
      </div>
    </div>
    <div class="mini-grid">${days.map(d=>`<div class="mini-dl">${d}</div>`).join('')}${cells}</div>
  `;
}
function miniNav(dir){miniDate=new Date(miniDate.getFullYear(),miniDate.getMonth()+dir,1);renderMiniCal();}

// ─── PERIOD LABEL ────────────────────────────────────────────────────────────
function renderPeriodLabel(){
  let label='';
  if(currentView==='month')label=currentDate.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  else if(currentView==='week'){
    const s=weekStart(currentDate),e=new Date(s);e.setDate(e.getDate()+6);
    label=`${s.toLocaleDateString('en-GB',{day:'numeric',month:'short'})} – ${e.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`;
  }
  else if(currentView==='day')label=currentDate.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  else if(currentView==='agenda')label=currentDate.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  else label='Dashboard';
  document.getElementById('period-label').textContent=label;
}

// ─── MONTH VIEW ──────────────────────────────────────────────────────────────
function renderMonth(cw){
  const showWE=document.getElementById('toggle-weekends')?.checked!==false;
  const cols=showWE?7:5;
  const dayLabels=showWE?['Mon','Tue','Wed','Thu','Fri','Sat','Sun']:['Mon','Tue','Wed','Thu','Fri'];
  const y=currentDate.getFullYear(),m=currentDate.getMonth();
  const first=new Date(y,m,1);
  let startDay=(first.getDay()+6)%7;
  if(!showWE)startDay=Math.min(startDay,4);
  const daysInMonth=new Date(y,m+1,0).getDate();
  const filtered=getFiltered(false);

  const header=document.createElement('div');
  header.className='month-day-labels';
  header.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  header.innerHTML=dayLabels.map(l=>`<div class="mdl">${l}</div>`).join('');

  const grid=document.createElement('div');
  grid.className='month-grid';
  grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;

  const prevLast=new Date(y,m,0).getDate();
  for(let i=startDay-1;i>=0;i--){
    const d=prevLast-i;
    const prevM=new Date(y,m-1,d);
    const dStr=ds(prevM);
    grid.appendChild(makeDayCell(dStr,d,true,filtered));
  }
  for(let d=1;d<=daysInMonth;d++){
    const dStr=`${y}-${p2(m+1)}-${p2(d)}`;
    const isWE=(new Date(y,m,d).getDay()===0||new Date(y,m,d).getDay()===6);
    if(!showWE&&isWE)continue;
    grid.appendChild(makeDayCell(dStr,d,false,filtered));
  }
  const totalCells=showWE?(startDay+daysInMonth):Math.ceil((startDay+daysInMonth)/cols)*cols;
  const rem=totalCells%cols===0?0:cols-(totalCells%cols);
  let nextD=1;
  for(let i=0;i<rem;i++){
    const nextM=new Date(y,m+1,nextD);
    grid.appendChild(makeDayCell(ds(nextM),nextD,true,filtered));
    nextD++;
  }

  cw.appendChild(header);
  cw.appendChild(grid);

  grid.querySelectorAll('.day-cell').forEach(el=>{
    el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over');});
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
    el.addEventListener('drop',e=>onCalDrop(e,el.dataset.date));
  });
}

function makeDayCell(dStr,dayNum,otherMonth,filtered){
  const cell=document.createElement('div');
  const isToday=dStr===ds(TODAY);
  const isWE=(() => {const d=pd(dStr);return d.getDay()===0||d.getDay()===6;})();
  cell.className=`day-cell${otherMonth?' other-month':''}${isToday?' is-today':''}${isWE?' is-weekend':''}`;
  cell.dataset.date=dStr;

  const dayTasks=tasksOn(dStr,filtered);
  const heat=document.getElementById('toggle-heat')?.checked!==false;
  const heatColor=dayTasks.length>=5?'#ef4444':dayTasks.length>=3?'#f59e0b':dayTasks.length>=1?'#22c55e':'transparent';

  const MAX=4;
  const chips=dayTasks.slice(0,MAX).map(t=>`
    <div class="task-chip${t.done?' done-chip':''}" style="background:${rgba(t.color,.15)};color:${t.color}"
      draggable="true" ondragstart="onDragStart(event,${t.id})" onclick="showPopup(event,${t.id})" title="${esc(t.title)}">
      ${t.priority==='high'?`<i class="ti ti-alert-triangle tc-pri"></i>`:''}
      <span class="tc-txt">${esc(t.title)}</span>
      ${t.startTime?`<span class="chip-time">${ft(t.startTime)}</span>`:''}
    </div>`).join('');
  const more=dayTasks.length>MAX?`<div class="more-link" onclick="openDep(event,'${dStr}')">+${dayTasks.length-MAX} more</div>`:'';

  cell.innerHTML=`
    <div class="day-num-row">
      <span class="day-num-inner">${isToday?`<span class="today-badge">${dayNum}</span>`:dayNum}</span>
      <div style="display:flex;align-items:center;gap:3px">
        ${heat&&dayTasks.length?`<div class="heat-dot" style="background:${heatColor}" title="${dayTasks.length} task${dayTasks.length>1?'s':''}"></div>`:''}
        <div class="day-actions">
          <button class="day-action-btn" onclick="openDep(event,'${dStr}')" title="Expand schedule"><i class="ti ti-layout-list"></i></button>
          <button class="day-action-btn" onclick="openModal(null,'${dStr}')" title="Add task"><i class="ti ti-plus"></i></button>
        </div>
      </div>
    </div>
    <div class="day-tasks-list">${chips}${more}</div>
  `;
  // clicking empty area opens add modal
  cell.addEventListener('click',e=>{
    if(e.target.closest('.task-chip,.more-link,.day-action-btn'))return;
    openModal(null,dStr);
  });
  return cell;
}

// ─── WEEK VIEW ───────────────────────────────────────────────────────────────
function weekStart(d){const day=d.getDay();const diff=day===0?-6:1-day;const s=new Date(d);s.setDate(d.getDate()+diff);return s;}
function renderWeek(cw){
  const start=weekStart(currentDate);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(start);d.setDate(start.getDate()+i);return d;});
  const dn=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const filtered=getFiltered(false);
  const wrap=document.createElement('div');
  wrap.className='week-wrap';
  const headerHtml=`<div class="week-corner"></div>`+days.map((d,i)=>{
    const dStr=ds(d);const isT=dStr===ds(TODAY);
    return`<div class="week-day-col-head${isT?' today-wcol':''}">
      <div class="wdch-name">${dn[i]}</div>
      <div class="wdch-num${isT?' today-num':''}">${d.getDate()}</div>
    </div>`;
  }).join('');
  const hours=Array.from({length:24},(_,i)=>i);
  const bodyRows=hours.map(h=>{
    const timeLabel=h===0?'12am':h<12?h+'am':h===12?'12pm':(h-12)+'pm';
    const dayCols=days.map(d=>{
      const dStr=ds(d);const isT=dStr===ds(TODAY);
      const hTasks=tasksOn(dStr,filtered).filter(t=>t.startTime&&t.startTime.startsWith(p2(h)));
      return`<div class="week-day-col${isT?' today-wcol':''}" style="border-left:1px solid var(--border)">
        <div class="week-hour-cell">
          ${hTasks.map(t=>`<div class="wh-chip" style="background:${rgba(t.color,.18)};color:${t.color}" onclick="showPopup(event,${t.id})">${esc(t.title)}</div>`).join('')}
        </div>
      </div>`;
    }).join('');
    return`<div class="week-time-col"><div class="week-hour-label">${timeLabel}</div></div>${dayCols}`;
  }).join('');
  wrap.innerHTML=`
    <div class="week-header-grid">${headerHtml}</div>
    <div class="week-body-scroll">${bodyRows}</div>
  `;
  cw.appendChild(wrap);
}

// ─── DAY VIEW ────────────────────────────────────────────────────────────────
function renderDay(cw){
  const dStr=ds(currentDate);
  const label=currentDate.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const filtered=getFiltered(false);
  const dayT=tasksOn(dStr,filtered);
  const timed=dayT.filter(t=>t.startTime).sort((a,b)=>a.startTime.localeCompare(b.startTime));
  const allDay=dayT.filter(t=>!t.startTime);
  const hours=Array.from({length:24},(_,i)=>i);

  const wrap=document.createElement('div');
  wrap.style.flex='1';wrap.style.overflow='hidden';wrap.style.display='flex';wrap.style.flexDirection='column';

  const allDayHtml=allDay.length?`
    <div class="dv-allday">
      <div class="dep-section-label">All-day / No time</div>
      ${allDay.map(t=>`<div class="dv-task${t.done?' is-done':''}" style="background:${rgba(t.color,.15)};color:${t.color}" onclick="showPopup(event,${t.id})">
        <i class="ti ti-circle-dot" style="font-size:12px"></i>${esc(t.title)}
        <span style="font-size:11px;margin-left:auto;opacity:.6">${dur2str(t.duration)}</span>
      </div>`).join('')}
    </div>`:'';

  const timeline=hours.map(h=>{
    const slotT=timed.filter(t=>t.startTime.startsWith(p2(h)));
    const timeL=h===0?'12 am':h<12?h+' am':h===12?'12 pm':(h-12)+' pm';
    return`<div class="dv-row">
      <div class="dv-time">${timeL}</div>
      <div class="dv-slot" onclick="openModalWithTime('${dStr}','${p2(h)}:00')">
        ${slotT.map(t=>`<div class="dv-task${t.done?' is-done':''}" style="background:${rgba(t.color,.18)};color:${t.color}" onclick="event.stopPropagation();showPopup(event,${t.id})">
          <i class="ti ti-circle-dot" style="font-size:12px"></i>
          <span style="flex:1">${esc(t.title)}</span>
          <span style="font-size:11px;opacity:.6;font-family:var(--mono)">${ft(t.startTime)}${t.endTime?' – '+ft(t.endTime):''}</span>
          ${t.duration?`<span style="font-size:11px;opacity:.5">${dur2str(t.duration)}</span>`:''}
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');

  wrap.innerHTML=`
    <div class="dv-header">
      <div><div class="dv-title">${label}</div><div class="dv-subtitle">${dayT.length} task${dayT.length!==1?'s':''}</div></div>
      <button class="btn btn-primary" style="font-size:12px;padding:6px 12px" onclick="openModal(null,'${dStr}')"><i class="ti ti-plus"></i> Add Task</button>
    </div>
    ${allDayHtml}
    <div class="day-view-wrap"><div class="dv-timeline">${timeline}</div></div>
  `;
  cw.appendChild(wrap);
}

// ─── AGENDA VIEW ─────────────────────────────────────────────────────────────
function renderAgenda(cw){
  const filtered=getFiltered(false).filter(t=>t.startDate||t.dueDate);
  const grouped={};
  filtered.forEach(t=>{
    const key=t.startDate||t.dueDate;
    if(!grouped[key])grouped[key]=[];
    grouped[key].push(t);
  });
  const sortedDates=Object.keys(grouped).sort();
  const wrap=document.createElement('div');
  wrap.style.flex='1';wrap.style.overflow='hidden';wrap.style.display='flex';wrap.style.flexDirection='column';
  if(!sortedDates.length){
    wrap.innerHTML=`<div class="agenda-empty"><i class="ti ti-calendar-off"></i>No tasks found for current filter</div>`;
    cw.appendChild(wrap);return;
  }
  const html=sortedDates.map(dStr=>{
    const d=pd(dStr),isT=dStr===ds(TODAY);
    const dayLabel=d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    const rowsHtml=grouped[dStr].sort((a,b)=>(a.startTime||'').localeCompare(b.startTime||'')).map(t=>`
      <div class="agenda-task-row${t.done?' is-done':''}" style="border-left-color:${t.color}" onclick="showPopup(event,${t.id})">
        <span class="pri-dot" style="background:${PRI_HEX[t.priority]}"></span>
        <div class="atr-info">
          <div class="atr-title">${esc(t.title)}</div>
          ${t.startTime?`<div class="atr-time">${ft(t.startTime)}${t.endTime?' – '+ft(t.endTime):''}</div>`:''}
        </div>
        <span class="cat-pill" style="background:${rgba(CAT_HEX[t.category]||'#888',.15)};color:${CAT_HEX[t.category]||'#888'}">${t.category}</span>
        ${t.recur!=='none'?`<i class="ti ti-repeat" style="font-size:13px;color:var(--text3)" title="Repeats ${t.recur}"></i>`:''}
      </div>`).join('');
    return`<div class="agenda-day">
      <div class="agenda-day-head">
        <div class="adh-date">${dayLabel}</div>
        ${isT?'<span class="adh-today-badge">Today</span>':''}
      </div>
      ${rowsHtml}
    </div>`;
  }).join('');
  wrap.innerHTML=`<div class="agenda-wrap">${html}</div>`;
  cw.appendChild(wrap);
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function renderDashboard(cw){
  const all=tasks.filter(t=>!t.archived);
  const todayDStr=ds(TODAY);
  const todayTasks=tasksOn(todayDStr,getFiltered(false));
  const done=all.filter(t=>t.done).length;
  const total=all.filter(t=>!t.unscheduled).length;
  const overdue=all.filter(t=>t.dueDate&&!t.done&&pd(t.dueDate)<TODAY);
  const upcoming=all.filter(t=>t.dueDate&&!t.done&&pd(t.dueDate)>=TODAY&&pd(t.dueDate)<=new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+7)).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const recent=all.filter(t=>t.done).slice(-5).reverse();
  const catCounts={};all.forEach(t=>{if(!t.unscheduled)catCounts[t.category]=(catCounts[t.category]||0)+1;});
  const priCounts={high:0,medium:0,low:0};all.filter(t=>!t.done).forEach(t=>priCounts[t.priority]++);

  const wrap=document.createElement('div');
  wrap.className='dashboard-wrap';
  wrap.innerHTML=`
    <div class="dash-grid">
      <div class="dash-card">
        <div class="dash-card-title">Tasks completed</div>
        <div class="dash-stat">${done}</div>
        <div class="dash-stat-label">of ${total} total</div>
      </div>
      <div class="dash-card">
        <div class="dash-card-title">Completion rate</div>
        <div class="dash-stat">${total?Math.round(done/total*100):0}%</div>
        <div class="dash-stat-label">overall progress</div>
      </div>
      <div class="dash-card">
        <div class="dash-card-title">Overdue tasks</div>
        <div class="dash-stat" style="color:var(--danger)">${overdue.length}</div>
        <div class="dash-stat-label">need attention</div>
      </div>
      <div class="dash-card">
        <div class="dash-card-title">Due this week</div>
        <div class="dash-stat" style="color:var(--warning)">${upcoming.length}</div>
        <div class="dash-stat-label">upcoming deadlines</div>
      </div>
      <div class="dash-card">
        <div class="dash-card-title">Today's tasks</div>
        <div class="dash-task-list">
          ${todayTasks.length?todayTasks.slice(0,6).map(t=>`
            <div class="dash-task-row${t.done?' done-row':''}" onclick="showPopup(event,${t.id})" style="border-left:3px solid ${t.color}">
              <span class="pri-dot" style="background:${PRI_HEX[t.priority]}"></span>
              <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px">${esc(t.title)}</span>
              ${t.startTime?`<span style="font-size:10px;color:var(--text3);font-family:var(--mono)">${ft(t.startTime)}</span>`:''}
            </div>`).join('')
          :`<div style="text-align:center;color:var(--text3);font-size:12px;padding:12px 0">No tasks today 🎉</div>`}
        </div>
      </div>
      <div class="dash-card">
        <div class="dash-card-title">Upcoming deadlines</div>
        <div class="dash-task-list">
          ${upcoming.slice(0,5).map(t=>`
            <div class="dash-task-row" onclick="showPopup(event,${t.id})" style="border-left:3px solid ${t.color}">
              <span class="pri-dot" style="background:${PRI_HEX[t.priority]}"></span>
              <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px">${esc(t.title)}</span>
              <span style="font-size:10px;color:var(--text3)">${fd(t.dueDate)}</span>
            </div>`).join('')||`<div style="text-align:center;color:var(--text3);font-size:12px;padding:12px 0">Nothing due soon</div>`}
        </div>
      </div>
      <div class="dash-card">
        <div class="dash-card-title">Overdue</div>
        <div class="dash-task-list">
          ${overdue.slice(0,5).map(t=>`
            <div class="dash-task-row" onclick="showPopup(event,${t.id})" style="border-left:3px solid var(--danger)">
              <span class="pri-dot" style="background:${PRI_HEX[t.priority]}"></span>
              <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px">${esc(t.title)}</span>
              <span style="font-size:10px;color:var(--danger)">${fd(t.dueDate)}</span>
            </div>`).join('')||`<div style="text-align:center;color:var(--text3);font-size:12px;padding:12px 0">Nothing overdue ✓</div>`}
        </div>
      </div>
      <div class="dash-card">
        <div class="dash-card-title">Recently completed</div>
        <div class="dash-task-list">
          ${recent.map(t=>`
            <div class="dash-task-row done-row" onclick="showPopup(event,${t.id})" style="border-left:3px solid ${t.color}">
              <i class="ti ti-check" style="font-size:12px;color:var(--success)"></i>
              <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px">${esc(t.title)}</span>
            </div>`).join('')||`<div style="text-align:center;color:var(--text3);font-size:12px;padding:12px 0">Nothing completed yet</div>`}
        </div>
      </div>
      <div class="dash-card dash-wide" id="chart-card">
        <div class="dash-card-title">Tasks by category</div>
        <div class="chart-wrap"><canvas id="cat-chart"></canvas></div>
      </div>
      <div class="dash-card" id="pri-chart-card">
        <div class="dash-card-title">Priority breakdown</div>
        <div class="chart-wrap" style="height:160px"><canvas id="pri-chart"></canvas></div>
      </div>
      <div class="dash-card">
        <div class="dash-card-title">Workload heatmap</div>
        <div id="heatmap-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px"></div>
        <div style="display:flex;gap:8px;margin-top:10px;font-size:10px;color:var(--text3)">
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#22c55e;vertical-align:middle;margin-right:3px"></span>Light</span>
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#f59e0b;vertical-align:middle;margin-right:3px"></span>Moderate</span>
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#ef4444;vertical-align:middle;margin-right:3px"></span>Heavy</span>
        </div>
      </div>
    </div>
  `;
  cw.appendChild(wrap);

  // Charts
  setTimeout(()=>{
    const cats=Object.keys(catCounts);
    const catCtx=document.getElementById('cat-chart');
    if(catCtx&&typeof Chart!=='undefined'){
      new Chart(catCtx,{type:'bar',data:{labels:cats,datasets:[{data:cats.map(c=>catCounts[c]),backgroundColor:cats.map(c=>rgba(CAT_HEX[c]||'#888',.7)),borderColor:cats.map(c=>CAT_HEX[c]||'#888'),borderWidth:2,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,color:getComputedStyle(document.documentElement).getPropertyValue('--text3').trim()},grid:{color:getComputedStyle(document.documentElement).getPropertyValue('--border').trim()}},x:{ticks:{color:getComputedStyle(document.documentElement).getPropertyValue('--text2').trim()},grid:{display:false}}}}});
      new Chart(document.getElementById('pri-chart'),{type:'doughnut',data:{labels:['High','Medium','Low'],datasets:[{data:[priCounts.high,priCounts.medium,priCounts.low],backgroundColor:['#ef4444','#f59e0b','#22c55e'],borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},color:getComputedStyle(document.documentElement).getPropertyValue('--text').trim()}}}}});
    }
    // Heatmap
    const hg=document.getElementById('heatmap-grid');
    if(hg){
      const today=TODAY;
      for(let i=-14;i<=14;i++){
        const d=new Date(today);d.setDate(d.getDate()+i);
        const dStr=ds(d);const count=tasksOn(dStr).length;
        const bg=count>=5?'#ef4444':count>=3?'#f59e0b':count>=1?'#22c55e':'var(--surface2)';
        const cell=document.createElement('div');
        cell.style.cssText=`height:20px;border-radius:4px;background:${bg};cursor:pointer;transition:opacity .12s`;
        cell.title=`${d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}: ${count} task${count!==1?'s':''}`;
        cell.onclick=()=>jumpTo(dStr);
        hg.appendChild(cell);
      }
    }
  },100);
}

// ─── DAY EXPANDED ────────────────────────────────────────────────────────────
function openDep(e,dStr){
  e.stopPropagation();
  const d=pd(dStr);
  const label=d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const isT=dStr===ds(TODAY);
  document.getElementById('dep-title').textContent=label;
  document.getElementById('dep-subtitle').textContent=isT?'Today':'';
  document.getElementById('dep-add-btn').onclick=()=>{openModal(null,dStr);closeDep();};
  renderDepBody(dStr);
  document.getElementById('dep-overlay').classList.add('open');
}
function renderDepBody(dStr){
  const dayT=getFiltered(false).filter(t=>tasksOn(dStr).includes(t));
  const allDay=dayT.filter(t=>!t.startTime);
  const timed=dayT.filter(t=>t.startTime).sort((a,b)=>a.startTime.localeCompare(b.startTime));
  const hours=Array.from({length:24},(_,i)=>i);
  const body=document.getElementById('dep-body');

  const allDayHtml=allDay.length?`<div class="dep-allday">
    <div class="dep-section-label">All-day</div>
    ${allDay.map(t=>`<div class="t-task-item${t.done?' is-done':''}" style="background:${rgba(t.color,.15)};color:${t.color}" onclick="showPopup(event,${t.id})">
      <i class="ti ti-circle-dot" style="font-size:12px"></i>${esc(t.title)}
      <span class="tti-dur">${dur2str(t.duration)}</span>
    </div>`).join('')}
  </div>`:'';

  const timelineHtml=hours.map(h=>{
    const slotT=timed.filter(t=>t.startTime.startsWith(p2(h)));
    const timeL=h===0?'12am':h<12?h+'am':h===12?'12pm':(h-12)+'pm';
    const addSlot=`<div class="dep-add-slot" onclick="openModalWithTime('${dStr}','${p2(h)}:00');closeDep()"><i class="ti ti-plus" style="font-size:12px"></i></div>`;
    return`<div class="timeline-row">
      <div class="t-time">${timeL}</div>
      <div class="t-tasks">
        ${slotT.map(t=>`<div class="t-task-item${t.done?' is-done':''}" style="background:${rgba(t.color,.18)};color:${t.color}" onclick="showPopup(event,${t.id})">
          <i class="ti ti-circle-dot" style="font-size:11px"></i>
          <span style="flex:1">${esc(t.title)}</span>
          <span class="tti-dur">${t.startTime?ft(t.startTime):''} ${t.endTime?'– '+ft(t.endTime):''} ${dur2str(t.duration)}</span>
        </div>`).join('')}
        ${addSlot}
      </div>
    </div>`;
  }).join('');

  body.innerHTML=dayT.length?`${allDayHtml}<div class="timeline-wrap">${timelineHtml}</div>`:
    `<div class="dep-empty"><i class="ti ti-calendar-plus" style="font-size:36px;display:block;margin-bottom:8px;opacity:.3"></i>No tasks scheduled.<br>Click + Add Task to get started.</div>`;
}
function closeDep(){document.getElementById('dep-overlay').classList.remove('open');}
function depBgClick(e){if(e.target===document.getElementById('dep-overlay'))closeDep();}

// ─── DRAG & DROP ─────────────────────────────────────────────────────────────
function onDragStart(e,id){
  dragId=id;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',String(id));
  setTimeout(()=>e.target.classList.add('dragging'),0);
}
function onCalDrop(e,dStr){
  e.preventDefault();
  document.querySelectorAll('.day-cell').forEach(c=>c.classList.remove('drag-over'));
  if(!dragId)return;
  const t=tasks.find(x=>x.id===dragId);
  if(!t)return;
  const oldStart=t.startDate,oldDue=t.dueDate;
  if(oldStart&&oldDue&&oldStart!==oldDue){
    const diff=(pd(oldDue)-pd(oldStart))/(1000*60*60*24);
    const newDue=new Date(pd(dStr));newDue.setDate(newDue.getDate()+diff);
    t.startDate=dStr;t.dueDate=ds(newDue);
  } else {t.startDate=dStr;t.dueDate=dStr;}
  t.unscheduled=false;
  dragId=null;
  showToast(`"${t.title}" moved to ${fd(dStr)}`);
  render();
}
function sidebarDrop(e){
  e.preventDefault();
  document.getElementById('sidebar-drop-zone').classList.remove('drag-active');
  if(!dragId)return;
  const t=tasks.find(x=>x.id===dragId);
  if(!t)return;
  t.unscheduled=true;t.startDate=null;t.dueDate=null;
  dragId=null;
  showToast(`"${t.title}" moved to Task Bank`);
  render();
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(id,date,mode){
  editingId=id||null;
  const t=id?tasks.find(x=>x.id===id):null;
  document.getElementById('modal-title').textContent=id?'Edit Task':'New Task';
  document.getElementById('delete-btn').style.display=id?'inline-flex':'none';
  document.getElementById('dupe-btn').style.display=id?'inline-flex':'none';
  document.getElementById('f-title').value=t?t.title:'';
  document.getElementById('f-desc').value=t?t.desc:'';
  document.getElementById('f-notes').value=t?t.notes:'';
  document.getElementById('f-start').value=t?t.startDate||'':date||'';
  document.getElementById('f-due').value=t?t.dueDate||'':date||'';
  document.getElementById('f-time-s').value=t?t.startTime||'':'';
  document.getElementById('f-time-e').value=t?t.endTime||'':'';
  document.getElementById('f-cat').value=t?t.category:'School';
  document.getElementById('f-recur').value=t?t.recur:'none';
  document.getElementById('f-dur').value=t?t.duration||'':'';
  document.getElementById('f-reminder').value=t?t.reminder||'none':'none';
  activePri=t?t.priority:'medium';
  activeColor=t?t.color:PRESET_COLORS[10];
  renderPriButtons();
  renderColorGrid();
  renderFavColors();
  document.getElementById('custom-color').value=activeColor;
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),80);
}
function openModalWithTime(date,time){
  openModal(null,date);
  document.getElementById('f-time-s').value=time;
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');editingId=null;}
function modalBgClick(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

function renderPriButtons(){
  document.querySelectorAll('.pri-btn').forEach(b=>{
    b.classList.remove('sel');
    if((b.classList.contains('ph')&&activePri==='high')||(b.classList.contains('pm')&&activePri==='medium')||(b.classList.contains('pl')&&activePri==='low'))b.classList.add('sel');
  });
}
function selPri(p,btn){
  activePri=p;
  document.querySelectorAll('.pri-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}
function renderColorGrid(){
  document.getElementById('color-grid').innerHTML=PRESET_COLORS.map(c=>
    `<div class="cs${c===activeColor?' selected':''}" style="background:${c}" onclick="pickColor('${c}',this)"></div>`
  ).join('');
}
function pickColor(c,el){
  activeColor=c;
  document.querySelectorAll('.cs').forEach(s=>s.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('custom-color').value=c;
}
function setCustomColor(c){
  activeColor=c;
  document.querySelectorAll('.cs').forEach(s=>s.classList.remove('selected'));
}
function saveFavColor(){
  if(!favColors.includes(activeColor)){favColors.push(activeColor);renderFavColors();showToast('Colour saved to favourites');}
}
function renderFavColors(){
  document.getElementById('fav-colors-row').innerHTML=favColors.map(c=>
    `<div class="fav-color-dot" style="background:${c}" onclick="pickColor('${c}',this)" title="${c}"></div>`
  ).join('');
}

function saveTask(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').style.borderColor='var(--danger)';document.getElementById('f-title').focus();setTimeout(()=>document.getElementById('f-title').style.borderColor='',1200);return;}
  const startDate=document.getElementById('f-start').value||null;
  const data={title,desc:document.getElementById('f-desc').value,notes:document.getElementById('f-notes').value,
    startDate,dueDate:document.getElementById('f-due').value||null,
    startTime:document.getElementById('f-time-s').value,endTime:document.getElementById('f-time-e').value,
    category:document.getElementById('f-cat').value,recur:document.getElementById('f-recur').value,
    duration:document.getElementById('f-dur').value,reminder:document.getElementById('f-reminder').value,
    priority:activePri,color:activeColor,unscheduled:!startDate};
  if(editingId){const i=tasks.findIndex(x=>x.id===editingId);tasks[i]={...tasks[i],...data};showToast('Task updated ✓');}
  else{tasks.push({id:nextId++,...data,done:false,archived:false});showToast('Task created ✓');}
  closeModal();render();
}
function deleteTask(){
  if(!confirm('Delete this task?'))return;
  tasks=tasks.filter(x=>x.id!==editingId);
  closeModal();showToast('Task deleted');render();
}
function dupeTask(){
  const t=tasks.find(x=>x.id===editingId);
  if(!t)return;
  tasks.push({...t,id:nextId++,title:t.title+' (copy)',done:false});
  closeModal();showToast('Task duplicated');render();
}

// ─── TASK POPUP ──────────────────────────────────────────────────────────────
function showPopup(e,id){
  e.stopPropagation();
  closePopup();
  const t=tasks.find(x=>x.id===id);
  if(!t)return;
  const pop=document.createElement('div');
  pop.className='task-popup';
  pop.innerHTML=`
    <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:8px">
      <div style="width:10px;height:10px;border-radius:50%;background:${t.color};flex-shrink:0;margin-top:4px"></div>
      <div class="tp-title" style="flex:1">${esc(t.title)}</div>
      <button class="icon-btn" style="flex-shrink:0" onclick="closePopup()"><i class="ti ti-x" style="font-size:15px"></i></button>
    </div>
    ${t.desc?`<div class="tp-desc">${esc(t.desc)}</div>`:''}
    <div class="tp-row"><i class="ti ti-tag"></i><span class="cat-pill" style="background:${rgba(CAT_HEX[t.category]||'#888',.15)};color:${CAT_HEX[t.category]||'#888'}">${t.category}</span></div>
    <div class="tp-row"><i class="ti ti-flag" style="color:${PRI_HEX[t.priority]}"></i><span style="color:${PRI_HEX[t.priority]}">${t.priority} priority</span></div>
    ${t.startDate?`<div class="tp-row"><i class="ti ti-calendar"></i>${fd(t.startDate)}${t.dueDate&&t.dueDate!==t.startDate?' → '+fd(t.dueDate):''}</div>`:''}
    ${t.startTime?`<div class="tp-row"><i class="ti ti-clock"></i>${ft(t.startTime)}${t.endTime?' – '+ft(t.endTime):''}</div>`:''}
    ${t.duration?`<div class="tp-row"><i class="ti ti-hourglass"></i>${dur2str(t.duration)}</div>`:''}
    ${t.recur!=='none'?`<div class="tp-row"><i class="ti ti-repeat"></i>Repeats ${t.recur}</div>`:''}
    ${t.notes?`<div class="tp-row" style="align-items:flex-start"><i class="ti ti-notes" style="margin-top:2px"></i><span style="font-size:11px;color:var(--text3)">${esc(t.notes)}</span></div>`:''}
    <div class="tp-actions">
      <button class="tpa" onclick="toggleDone(${t.id})"><i class="ti ${t.done?'ti-circle-x':'ti-circle-check'}"></i>${t.done?'Undo':'Done'}</button>
      <button class="tpa" onclick="openModal(${t.id});closePopup()"><i class="ti ti-edit"></i>Edit</button>
      <button class="tpa" onclick="archiveTask(${t.id})"><i class="ti ti-archive"></i></button>
      <button class="tpa danger" onclick="quickDelete(${t.id})"><i class="ti ti-trash"></i></button>
    </div>
  `;
  document.body.appendChild(pop);
  popupEl=pop;
  const rect=e.target.getBoundingClientRect();
  let left=rect.right+10,top=rect.top;
  if(left+320>window.innerWidth)left=rect.left-320;
  if(top+320>window.innerHeight)top=window.innerHeight-330;
  pop.style.left=Math.max(8,left)+'px';
  pop.style.top=Math.max(8,top)+'px';
  setTimeout(()=>document.addEventListener('click',closePopup,{once:true}),50);
}
function closePopup(){if(popupEl){popupEl.remove();popupEl=null;}}
function toggleDone(id){
  const t=tasks.find(x=>x.id===id);
  if(t){t.done=!t.done;showToast(t.done?`"${t.title}" completed ✓`:'Task reopened');}
  closePopup();render();
}
function quickDelete(id){
  tasks=tasks.filter(x=>x.id!==id);
  closePopup();showToast('Task deleted');render();
}
function archiveTask(id){
  const t=tasks.find(x=>x.id===id);
  if(t){t.archived=true;showToast(`"${t.title}" archived`);}
  closePopup();render();
}

// ─── SETTINGS ────────────────────────────────────────────────────────────────
function openSettings(){document.getElementById('settings-overlay').classList.add('open');}
function closeSettings(){document.getElementById('settings-overlay').classList.remove('open');}
function settingsBgClick(e){if(e.target===document.getElementById('settings-overlay'))closeSettings();}
function applyTheme(){
  const dark=document.getElementById('toggle-dark').checked;
  const hc=document.getElementById('toggle-hc').checked;
  document.documentElement.dataset.theme=hc?'high-contrast':dark?'dark':'light';
}
function setFontSize(sz,btn){
  document.body.style.fontSize=sz;
  document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function toggleSidebar(){
  sidebarOpen=!sidebarOpen;
  document.getElementById('sidebar').style.width=sidebarOpen?'var(--sidebar-w)':'0';
  document.getElementById('sidebar').style.overflow=sidebarOpen?'hidden':'hidden';
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function navigate(dir){
  if(currentView==='month')currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()+dir,1);
  else if(currentView==='week'){currentDate=new Date(currentDate);currentDate.setDate(currentDate.getDate()+dir*7);}
  else{currentDate=new Date(currentDate);currentDate.setDate(currentDate.getDate()+dir);}
  render();
}
function goToday(){currentDate=new Date(TODAY);render();}
function setView(v){
  currentView=v;
  document.querySelectorAll('.view-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('vt-'+v).classList.add('active');
  render();
}
function jumpTo(dStr){
  currentDate=pd(dStr);
  miniDate=new Date(currentDate.getFullYear(),currentDate.getMonth(),1);
  render();
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg,icon=''){
  const t=document.getElementById('toast');
  t.innerHTML=`${icon?`<i class="ti ${icon}"></i>`:''}${msg}`;
  t.classList.add('visible');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('visible'),2800);
}

// ─── KEYBOARD ────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  const inInput=e.target.matches('input,textarea,select');
  if(e.key==='Escape'){
    if(document.getElementById('modal-overlay').classList.contains('open')){closeModal();return;}
    if(document.getElementById('dep-overlay').classList.contains('open')){closeDep();return;}
    if(document.getElementById('settings-overlay').classList.contains('open')){closeSettings();return;}
    closePopup();
  }
  if(inInput)return;
  if(e.key==='ArrowLeft')navigate(-1);
  if(e.key==='ArrowRight')navigate(1);
  if(e.key==='t'||e.key==='T')goToday();
  if(e.key==='n'||e.key==='N')openModal(null,null);
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();document.getElementById('search-input').focus();}
  if(e.key==='m')setView('month');
  if(e.key==='w')setView('week');
  if(e.key==='d')setView('day');
  if(e.key==='a')setView('agenda');
});

// Sidebar drop zone events
document.getElementById('sidebar-drop-zone').addEventListener('dragover',e=>{e.preventDefault();document.getElementById('sidebar-drop-zone').classList.add('drag-active');});
document.getElementById('sidebar-drop-zone').addEventListener('dragleave',()=>document.getElementById('sidebar-drop-zone').classList.remove('drag-active'));

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
</script>
